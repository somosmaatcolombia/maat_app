<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MAAT &#8212; Calibraci&oacute;n Diaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@400;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --c:#39A1C9;--o:#EBA055;--m:#7DCD93;--v:#89608E;--r:#D76B6E;
  --bg:#0d1117;--bg2:#161b22;--text:#e8eaf0;--mu:#b8c0cc;--mu2:#9aa0ae;
  --bd:rgba(255,255,255,0.12);
  --phase1:#39A1C9;--phase2:#EBA055;--phase3:#7DCD93;--phase4:#89608E;
  --radius:14px;--radius-sm:8px;
  --font-title:'Saira Condensed',sans-serif;
  --font-body:'Sora',sans-serif;
  --nav-h:64px;--topbar-h:56px;
}
[data-theme="light"]{
  --bg:#f5f7fa;--bg2:#ffffff;--text:#111827;--mu:#374151;--mu2:#4b5563;
  --bd:rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--mu2);border-radius:4px;}

/* FIX: auth hidden by default &#8212; no flash */
#auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;}
#auth-screen.visible{display:flex;}
#auth-screen .logo-auth{width:120px;margin-bottom:24px;border-radius:20px;}
#auth-screen h1{font-family:var(--font-title);font-size:32px;font-weight:700;letter-spacing:1px;margin-bottom:6px;}
#auth-screen .subtitle{color:var(--mu);font-size:14px;margin-bottom:32px;}
.auth-box{width:100%;max-width:340px;}
.auth-box input{width:100%;padding:14px 16px;margin-bottom:12px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border .2s;}
.auth-box input:focus{border-color:var(--c);}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--c);color:#fff;font-family:var(--font-title);font-size:16px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity .2s;touch-action:manipulation;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
/* auth helper text */
#auth-error{color:var(--r);font-size:13px;margin-top:12px;min-height:18px;}

/* BOOT LOADER */
#boot-loader{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);}
#boot-loader .boot-dot{width:10px;height:10px;border-radius:50%;background:var(--c);animation:bootPulse .8s infinite alternate;}
#boot-loader .boot-dot:nth-child(2){animation-delay:.15s;background:var(--o);}
#boot-loader .boot-dot:nth-child(3){animation-delay:.3s;background:var(--m);}
#boot-loader{gap:8px;}
@keyframes bootPulse{to{opacity:.2;transform:scale(.6);}}

/* APP SHELL */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:90;}
.topbar .logo-small{height:28px;border-radius:6px;}
.topbar .topbar-title{font-family:var(--font-title);font-size:18px;font-weight:600;letter-spacing:.5px;}
.topbar .btn-profile{width:36px;height:36px;border-radius:50%;border:2px solid var(--c);background:var(--bg2);color:var(--c);font-family:var(--font-title);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(var(--nav-h) + 16px);scroll-behavior:smooth;}
.view{display:none;}
.view.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.sv-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.sv-header .btn-back{background:none;border:none;color:var(--c);font-size:22px;cursor:pointer;padding:10px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.sv-header h2{font-family:var(--font-title);font-size:22px;font-weight:600;}

/* NAV BAR */
.nav-bar{height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;background:var(--bg);border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;cursor:pointer;color:var(--mu);transition:color .2s;background:none;border:none;font-family:var(--font-body);font-size:11px;touch-action:manipulation;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-item.active{color:var(--c);}
.nav-item span{color:inherit;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-family:var(--font-title);font-size:16px;font-weight:600;margin-bottom:8px;letter-spacing:.3px;}
.stat-row{display:flex;gap:8px;margin-bottom:12px;}
.stat-box{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;}
.stat-box .stat-val{font-family:var(--font-title);font-size:22px;font-weight:700;}
.stat-box .stat-label{font-size:14px;color:var(--mu);margin-top:2px;}

/* FORMS */
textarea,.input-field{width:100%;padding:12px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;resize:vertical;transition:border .2s;}
textarea:focus,.input-field:focus{border-color:var(--c);}
textarea{min-height:80px;}
label.field-label{display:block;font-size:14px;color:var(--mu);margin-bottom:6px;font-weight:500;}

/* SLIDER */
.slider-wrap{margin:16px 0;}
.slider-wrap input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,var(--r),var(--o),var(--m));outline:none;}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--text);border:3px solid var(--c);cursor:pointer;}
.slider-labels{display:flex;justify-content:space-between;font-size:14px;color:var(--mu);margin-top:4px;}
.slider-val{text-align:center;font-family:var(--font-title);font-size:36px;font-weight:700;color:var(--c);}

/* BUTTONS */
.btn-action{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--c);color:#fff;font-family:var(--font-title);font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:12px;touch-action:manipulation;}
.btn-action:disabled{opacity:.5;cursor:not-allowed;}
.btn-action.secondary{background:transparent;border:1px solid var(--c);color:var(--c);}

/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;pointer-events:none;background:var(--bg2);border:1px solid var(--bd);color:var(--text);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--m);color:var(--m);}
#toast.err{border-color:var(--r);color:var(--r);}

/* HOME */
.home-greeting{font-family:var(--font-title);font-size:26px;font-weight:700;margin-bottom:4px;}
.home-week{color:var(--mu);font-size:13px;margin-bottom:16px;}
.streak-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--bg2);border:1px solid var(--bd);font-size:14px;color:var(--o);margin-bottom:16px;}
/* OFFLINE BANNER */
#offline-banner{position:fixed;top:0;left:0;right:0;z-index:998;background:var(--r);color:#fff;text-align:center;font-size:13px;font-weight:500;padding:8px;transform:translateY(-100%);transition:transform .3s ease;}
#offline-banner.show{transform:translateY(0);}
/* PWA INSTALL BANNER */
#pwa-banner{position:fixed;bottom:calc(var(--nav-h) + 8px);left:12px;right:12px;z-index:997;background:var(--bg2);border:1px solid var(--c);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;transform:translateY(200%);transition:transform .4s ease;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#pwa-banner.show{transform:translateY(0);}
#pwa-banner p{flex:1;font-size:13px;color:var(--text);}
#pwa-banner .pwa-install{padding:8px 14px;border:none;border-radius:var(--radius-sm);background:var(--c);color:#fff;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;}
#pwa-banner .pwa-dismiss{padding:8px;border:none;background:none;color:var(--mu);font-size:18px;cursor:pointer;touch-action:manipulation;}
/* CALIB STEP INDICATOR */
.calib-steps{display:flex;align-items:center;gap:6px;margin-bottom:20px;}
.calib-step-dot{width:8px;height:8px;border-radius:50%;background:var(--bd);transition:all .3s;}
.calib-step-dot.done{background:var(--m);}
.calib-step-dot.active{background:var(--c);width:20px;border-radius:4px;}
.calib-step-label{font-size:13px;color:var(--mu);margin-left:auto;}
/* COACH CHIPS */
.coach-chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0;}
.coach-chip{padding:8px 14px;border:1px solid var(--bd);border-radius:20px;font-size:13px;color:var(--text);background:var(--bg2);cursor:pointer;transition:all .2s;touch-action:manipulation;}
.coach-chip:hover{border-color:var(--c);color:var(--c);}
/* HABIT CHECK ANIMATION */
@keyframes habitPop{0%{transform:scale(1);}40%{transform:scale(1.35);}70%{transform:scale(.92);}100%{transform:scale(1);}}
.habit-day.pop{animation:habitPop .35s ease;}
/* COHERENCE RING */
.coh-ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;margin:0 auto 4px;}
.coh-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.coh-ring-val{font-family:var(--font-title);font-size:14px;font-weight:700;position:relative;z-index:1;}
/* ONBOARDING CARD */
.onboarding-card{background:linear-gradient(135deg,rgba(57,161,201,.12),rgba(57,161,201,.04));border:1px solid rgba(57,161,201,.3);border-radius:var(--radius);padding:20px;text-align:center;margin:16px 0;}
.onboarding-card h3{font-family:var(--font-title);font-size:18px;margin-bottom:8px;color:var(--c);}
.onboarding-card p{font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:14px;}
.cta-calib{background:linear-gradient(135deg,var(--c),#2d8ab0);border-radius:var(--radius);padding:20px;text-align:center;margin:16px 0;cursor:pointer;transition:transform .15s;touch-action:manipulation;}
.cta-calib:active{transform:scale(.98);}
.cta-calib h3{font-family:var(--font-title);font-size:18px;margin-bottom:4px;}
.cta-calib p{font-size:12px;opacity:.8;}
.last-calib{font-size:14px;color:var(--mu);margin-top:8px;}
.last-calib strong{color:var(--text);}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-family:var(--font-title);font-size:14px;font-weight:600;letter-spacing:.5px;}

/* HABITS */
.habit-item{background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.habit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.habit-name-text{font-weight:600;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.habit-freq{font-size:14px;color:var(--mu);background:var(--bg2);padding:2px 8px;border-radius:10px;white-space:nowrap;}
.habit-days{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;}
.habit-day{min-width:34px;width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text);cursor:pointer;transition:all .15s;flex-shrink:0;touch-action:manipulation;}
.habit-day.checked{background:var(--m);color:#fff;border-color:var(--m);}
.habit-progress{height:4px;border-radius:2px;background:var(--bd);margin-top:8px;overflow:hidden;}
.habit-progress .fill{height:100%;border-radius:2px;transition:width .3s;}
.btn-del-habit{background:none;border:none;color:var(--r);cursor:pointer;font-size:14px;padding:2px 6px;flex-shrink:0;touch-action:manipulation;}
.add-habit-form{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:14px;margin-top:12px;}
.add-habit-form .row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.add-habit-form .row>div{flex:1;min-width:100px;}
.add-habit-form .row>div:last-child{flex:0 0 auto;}
.add-habit-form label{display:block;font-size:14px;color:var(--mu);margin-bottom:4px;}
.add-habit-form input,.add-habit-form select{width:100%;padding:10px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;outline:none;}
.add-habit-form button{padding:10px 16px;background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;white-space:nowrap;touch-action:manipulation;}
.coherence-big{text-align:center;padding:20px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);margin-bottom:16px;}
.coherence-big .coh-val{font-family:var(--font-title);font-size:48px;font-weight:700;}
.coherence-big .coh-label{font-size:14px;color:var(--mu);}

/* COACH */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - var(--topbar-h) - var(--nav-h) - 32px);}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px;}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:15px;line-height:1.5;word-wrap:break-word;}
.chat-msg.user{align-self:flex-end;background:var(--c);color:#fff;border-bottom-right-radius:4px;}
.chat-msg.assistant{align-self:flex-start;background:var(--bg2);border:1px solid var(--bd);border-bottom-left-radius:4px;color:var(--text);}
.chat-input-row{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--bd);margin-top:8px;}
.chat-input-row input{flex:1;padding:12px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;}
.chat-input-row button{padding:12px 16px;background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:16px;touch-action:manipulation;}
.typing-indicator{display:flex;gap:4px;padding:10px 14px;}
.typing-indicator span{width:8px;height:8px;border-radius:50%;background:var(--mu);animation:typeBounce .6s infinite alternate;}
.typing-indicator span:nth-child(2){animation-delay:.2s;}
.typing-indicator span:nth-child(3){animation-delay:.4s;}
@keyframes typeBounce{to{opacity:.3;transform:translateY(-4px);}}

/* M&Aacute;S */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.menu-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:20px 14px;text-align:center;cursor:pointer;transition:all .15s;touch-action:manipulation;}
.menu-item:active{transform:scale(.97);}
.menu-item .menu-icon{font-size:28px;margin-bottom:6px;}
.menu-item .menu-label{font-family:var(--font-title);font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--text);}

/* PROGRESO */
.phase-section{margin-bottom:20px;}
.phase-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius) var(--radius) 0 0;font-family:var(--font-title);font-size:16px;font-weight:600;}
.phase-weeks{border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.pw-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bd);}
.pw-item:last-child{border-bottom:none;}
.pw-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--mu2);flex-shrink:0;margin-top:4px;}
.pw-dot.done{border-color:var(--m);background:var(--m);}
.pw-dot.current{border-color:var(--c);background:var(--c);}
.pw-info{flex:1;cursor:pointer;}
.pw-title{font-weight:600;font-size:14px;}
.pw-summary{font-size:14px;color:var(--mu);margin-top:2px;}
.pw-edit{display:none;margin-top:10px;}
.pw-edit.open{display:block;}
.pw-edit textarea{min-height:100px;margin-bottom:8px;}
.pw-edit button{padding:8px 16px;background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;touch-action:manipulation;}

/* BELIEFS */
.belief-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.belief-filter{padding:6px 12px;border-radius:16px;border:1px solid var(--bd);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;touch-action:manipulation;}
.belief-filter.active{background:var(--c);color:#fff;border-color:var(--c);}
.belief-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius-sm);margin-bottom:8px;}
.belief-cat-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.btn-del{background:none;border:none;color:var(--r);cursor:pointer;font-size:16px;padding:4px;touch-action:manipulation;}

/* HISTORIAL */
.hist-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:12px;cursor:pointer;}
.hist-header .hist-date{font-family:var(--font-title);font-weight:600;}
.hist-header .hist-coh{padding:2px 10px;border-radius:12px;font-size:14px;font-weight:600;font-family:var(--font-title);}
.hist-body{padding:0 12px 12px;display:none;font-size:14px;color:var(--mu);}
.hist-body.open{display:block;}
.hist-body p{margin-bottom:6px;}
.hist-body strong{color:var(--text);}

/* AUDIO */
.audio-player{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:20px;text-align:center;margin:16px 0;}
.audio-player .play-btn{width:56px;height:56px;border-radius:50%;border:none;background:var(--c);color:#fff;font-size:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin:12px 0;touch-action:manipulation;}
.audio-progress{width:100%;height:4px;border-radius:2px;background:var(--bd);margin:12px 0;position:relative;cursor:pointer;}
.audio-progress .fill{height:100%;background:var(--c);border-radius:2px;transition:width .1s;}
.audio-controls{display:flex;align-items:center;justify-content:center;gap:20px;}
.audio-controls button{background:none;border:none;color:var(--mu);font-size:14px;cursor:pointer;touch-action:manipulation;}
.audio-time{font-size:14px;color:var(--mu);font-family:var(--font-title);}

/* SKELETON LOADERS */
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bd) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}
.skel-line{height:14px;margin-bottom:10px;border-radius:4px;}
.skel-line.short{width:60%;}
.skel-line.med{width:80%;}
.skel-box{height:72px;border-radius:var(--radius-sm);margin-bottom:10px;}
.skel-circle{width:56px;height:56px;border-radius:50%;margin:0 auto 8px;}
.skel-stat-row{display:flex;gap:8px;margin-bottom:12px;}
.skel-stat-row .skel-box{flex:1;}
/* FORM VALIDATION */
.field-error{border-color:var(--r) !important;}
.field-error-msg{color:var(--r);font-size:12px;margin-top:4px;}
/* ONBOARDING OVERLAY */
#onboarding-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
#onboarding-overlay.visible{display:flex;}
.ob-step{max-width:340px;animation:fadeUp .4s ease;}
.ob-icon{font-size:56px;margin-bottom:16px;}
.ob-title{font-family:var(--font-title);font-size:24px;font-weight:700;margin-bottom:8px;}
.ob-text{font-size:14px;color:var(--mu);line-height:1.7;margin-bottom:24px;}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}

function fmtDate(){const d=new Date();const m=lang==="es"?["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"]:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return d.getDate()+" "+m[d.getMonth()];}
function fmtDateISO(d){d=d||new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function calibradoHoy(){const td=fmtDate();const ti=fmtDateISO();return cals.some(c=>{const d=c.date||"";return d===td||d===ti;});}

// FIX: centralized habits parser \u2014 avoids repeated try/catch JSON parsing
function getHabits(week){
  const d=ht[week];
  if(!d)return[];
  try{return typeof d.habits==="string"?JSON.parse(d.habits):(d.habits||[]);}
  catch(e){return[];}
}

function calcStreak(){
  if(!cals.length)return 0;
  const sorted=[...cals].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  let streak=0;const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<sorted.length;i++){
    const d=new Date(sorted[i].created_at);d.setHours(0,0,0,0);
    const exp=new Date(today);exp.setDate(exp.getDate()-i);
    if(d.getTime()===exp.getTime())streak++;else break;
  }
  return streak;
}

function calcCoherence(weekNum){
  const habits=getHabits(weekNum||hwk);
  if(!habits.length)return 0;
  const sumPct=habits.reduce((s,h)=>{
    const freq=h.frequency||7;
    const checked=Math.min((h.days||[]).filter(Boolean).length,freq);
    return s+(checked/freq)*100;
  },0);
  return Math.round(sumPct/habits.length);
}

function calcHabPct(weekNum){
  const habits=getHabits(weekNum||hwk);
  if(!habits.length)return 0;
  let totalExpected=0,totalDone=0;
  habits.forEach(h=>{
    const freq=h.frequency||7;
    totalExpected+=freq;
    totalDone+=Math.min((h.days||[]).filter(Boolean).length,freq);
  });
  return totalExpected?Math.round(totalDone/totalExpected*100):0;
}

function calcAttitudeAvg(){
  if(!cals.length)return null;
  const recent=cals.slice(0,7);
  return(recent.reduce((s,c)=>s+c.coherence,0)/recent.length).toFixed(1);
}

/* ============ AUDIO MANAGER \u2014 single instance, prevents overlap ============ */
const Audio_={
  _current:null,
  // Create or reuse an Audio() object for a given url+key
  get(key,url){
    if(!this._store)this._store={};
    if(!this._store[key]||this._store[key]._url!==url){
      if(this._store[key])this._store[key].pause();
      const a=new Audio();
      a._url=url;a._key=key;a.preload="metadata";
      this._store[key]=a;
    }
    return this._store[key];
  },
  // Stop all except given key
  stopOthers(key){
    if(!this._store)return;
    Object.keys(this._store).forEach(k=>{
      if(k!==key&&!this._store[k].paused)this._store[k].pause();
    });
  },
  play(key,url){
    const a=this.get(key,url);
    this.stopOthers(key);
    if(!a.src||a.src!==url)a.src=url;
    return a.play();
  },
  pause(key){if(this._store&&this._store[key])this._store[key].pause();},
  toggle(key,url,onPlay,onPause){
    const a=this.get(key,url);
    if(a.paused){this.play(key,url).then(()=>onPlay&&onPlay()).catch(e=>toast("Error: "+e.message,"err"));}
    else{a.pause();onPause&&onPause();}
  },
  onTime(key,cb){const a=this._store?.[key];if(a){a.removeEventListener("timeupdate",a._timeCb);a._timeCb=cb;a.addEventListener("timeupdate",cb);}},
  onEnd(key,cb){const a=this._store?.[key];if(a){a.removeEventListener("ended",a._endCb);a._endCb=cb;a.addEventListener("ended",cb);}},
  seek(key,pct){const a=this._store?.[key];if(a&&a.duration)a.currentTime=pct*a.duration;},
  skip(key,s){const a=this._store?.[key];if(a)a.currentTime=Math.max(0,a.currentTime+s);},
  isPaused(key){return!this._store?.[key]||this._store[key].paused;},
};

function showAchievement(icon,title,text){
  const el=document.getElementById("achievement");
  el.querySelector(".ach-icon").textContent=icon;

function checkAchievements(){
  const streak=calcStreak();
  const shownKey="maat-ach-"+user.id;
  const shown=JSON.parse(localStorage.getItem(shownKey)||"{}");
  // Streak milestones
  [3,7,14,21,30].forEach(n=>{
    if(streak>=n&&!shown["streak-"+n]){
      shown["streak-"+n]=true;
      const titles_es={"3":"\u00A13 d\u00EDas seguidos!","7":"\u00A1Una semana completa!","14":"\u00A12 semanas imparable!","21":"\u00A121 d\u00EDas \u2014 Nuevo h\u00E1bito!","30":"\u00A130 d\u00EDas \u2014 Leyenda!"};
      const titles_en={"3":"3-day streak!","7":"Full week!","14":"2 weeks unstoppable!","21":"21 days \u2014 New habit!","30":"30 days \u2014 Legend!"};
      setTimeout(()=>showAchievement("\u{1F525}",lang==='es'?titles_es[n]:titles_en[n],lang==='es'?`Llevas ${n} d\u00EDas calibrando sin parar`:`${n} days calibrating non-stop`),1200);
    }
  });
  // Phase completion
  [1,2,3,4].forEach(p=>{
    const startW=(p-1)*4+1;const endW=p*4;
    const allDone=[startW,startW+1,startW+2,endW].every(w=>wkp[w]);
    if(allDone&&!shown["phase-"+p]){
      shown["phase-"+p]=true;
      const names_es=["GRATITUD","AMOR","INTENCI\u00D3N","VOLUNTAD"];
      const names_en=["GRATITUDE","LOVE","INTENTION","WILL"];
      setTimeout(()=>showAchievement("\u25C6",lang==='es'?`\u00A1Fase ${p} completada!`:`Phase ${p} complete!`,lang==='es'?`Dominaste ${names_es[p-1]}`:`You mastered ${names_en[p-1]}`),1500);
    }
  });
  // First calibration
  if(cals.length===1&&!shown["first-calib"]){
    shown["first-calib"]=true;
    setTimeout(()=>showAchievement("\u{1F3AF}",lang==='es'?"\u00A1Primera calibraci\u00F3n!":"First calibration!",lang==='es'?"El viaje de 16 semanas comienza hoy":"The 16-week journey starts today"),800);
  }
  localStorage.setItem(shownKey,JSON.stringify(shown));
}

async function loadData(){
  if(_loading)return;_loading=true;
  const uid=user.id;
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),12000));
  try{
    const results=await Promise.race([
      Promise.allSettled([
        sb.from("profiles").select("*").eq("id",uid).single(),
        sb.from("calibrations").select("*").eq("user_id",uid).order("created_at",{ascending:false}).limit(200),
        sb.from("beliefs").select("*").eq("user_id",uid).order("created_at",{ascending:false}),
        sb.from("week_progress").select("*").eq("user_id",uid),
        sb.from("habit_tracker").select("*").eq("user_id",uid),
        sb.from("statement_hipnosis").select("*").eq("user_id",uid).single(),
        sb.from("ai_config").select("system_prompt").eq("id",1).single(),
        sb.from("phase_reflections").select("*").eq("user_id",uid),
        sb.from("session_notes").select("session_type,session_date,notes,next_plan,client_week").eq("client_id",uid).order("created_at",{ascending:false}).limit(10),
      ]),timeout
    ]);
    if(results[0].status==="fulfilled"){const{data,error}=results[0].value;if(!error&&data){prof=data;hwk=prof.current_week||1;notifHour=prof.notification_hour||9;if(prof.preferred_lang&&prof.preferred_lang!==lang){lang=prof.preferred_lang;localStorage.setItem("maat-lang",lang);}}else if(error)chkAuthErr(error);}
    if(results[1].status==="fulfilled"){const{data,error}=results[1].value;if(!error)cals=data||[];else chkAuthErr(error);}
    if(results[2].status==="fulfilled"){const{data,error}=results[2].value;if(!error)bels=data||[];else chkAuthErr(error);}
    if(results[3].status==="fulfilled"){const{data,error}=results[3].value;if(!error&&data){wkp={};data.forEach(r=>{wkp[r.week]=r.completed;});}else if(error)chkAuthErr(error);}
    if(results[4].status==="fulfilled"){const{data,error}=results[4].value;if(!error&&data){ht={};wkLearning={};data.forEach(r=>{ht[r.week]=r;if(r.learned)wkLearning[r.week]=r.learned;});}else if(error)chkAuthErr(error);}
    if(results[5].status==="fulfilled"){const{data}=results[5].value;if(data)sh=data;}
    if(results[6].status==="fulfilled"){const{data}=results[6].value;if(data)aiCfg=data;}
    if(results[8]?.status==="fulfilled"){const{data}=results[8].value;if(data)mentorNotes=data||[];}
  }catch(e){console.warn("loadData:",e.message);}
  finally{_loading=false;}
}

        }catch(e){console.warn("Hip audio fallback failed:",e);}
      });
    }
  }

function nextCalibStep(){

  if(!val){inp?.classList.add("field-error");inp?.focus();toast(t("error_fields"),"err");return;}
  inp?.classList.remove("field-error");
  _calibAnswers[keys[_calibStep]]=val;
  _calibStep++;
  renderCalibStep();
  document.getElementById("v-calib")?.scrollTo({top:0,behavior:'instant'});
  document.querySelector('.main-content')?.scrollTo({top:0,behavior:'instant'});

function prevCalibStep(){
  const keys=["q1","q2","q3"];
  const val=document.getElementById("inp-step")?.value.trim();
  if(val)_calibAnswers[keys[_calibStep]]=val;
  _calibStep=Math.max(0,_calibStep-1);

// FIX: chgHW modifies local view week only, not global hwk
// LOCK: no puede avanzar a la siguiente semana sin evaluar la actual
function chgHW(d){
  const n=_habViewWeek+d;
  if(n<1||n>16)return;
  if(d>0&&!wkp[_habViewWeek]){
    toast(lang==='es'
      ?`Eval\u00FAa la Semana ${_habViewWeek} antes de continuar`
      :`Evaluate Week ${_habViewWeek} before continuing`,"err");
    return;
  }
  _habViewWeek=n;renderHabits();
}

// FIX: toggleDay updates both DOM and ht state object
function toggleDay(el){
  el.classList.toggle("checked");
  el.classList.remove("pop");
  void el.offsetWidth; // force reflow
  el.classList.add("pop");
  setTimeout(()=>el.classList.remove("pop"),400);
  const isChecked=el.classList.contains("checked");
  el.textContent=isChecked?"\u2713":t("days")[parseInt(el.dataset.di)];
  // Sync state
  const hi=parseInt(el.dataset.hi);
  const di=parseInt(el.dataset.di);
  const habits=getHabits(_habViewWeek);
  if(habits[hi]){
    if(!habits[hi].days)habits[hi].days=[false,false,false,false,false,false,false];
    habits[hi].days[di]=isChecked;
    if(!ht[_habViewWeek])ht[_habViewWeek]={habits:[]};
    ht[_habViewWeek].habits=habits;
    // Update progress bar inline without full re-render
    const item=el.closest(".habit-item");
    if(item){
      const freq=habits[hi].frequency||7;
      const done=Math.min(habits[hi].days.filter(Boolean).length,freq);
      const pct=Math.min(100,Math.round(done/freq*100));
      const isFulfilled=done>=freq;
      const fill=item.querySelector(".habit-progress .fill");
      if(fill){fill.style.width=pct+"%";fill.style.background=isFulfilled?'var(--m)':'var(--o)';}
      const freqEl=item.querySelector(".habit-freq");
      if(freqEl)freqEl.innerHTML=`${done}/${freq} \u00B7 ${pct}%${isFulfilled?' <span style="color:var(--m)">\u2713</span>':''}`;
    }
    // Update coherence header
    const cohEl=document.querySelector(".coherence-big .coh-val");
    const coh=calcCoherence(_habViewWeek);
    if(cohEl){cohEl.textContent=coh+"%";cohEl.style.color=cohColor(coh);}
  }
}

function addHabit(){
  const nameEl=document.getElementById("new-h-name");
  const name=nameEl.value.trim();
  const freq=parseInt(document.getElementById("new-h-freq").value)||5;
  if(!name){nameEl.classList.add("field-error");nameEl.focus();toast(lang==='es'?'Escribe el nombre del h\u00E1bito':'Enter habit name',"err");return;}
  nameEl.classList.remove("field-error");
  const habits=getHabits(_habViewWeek);
  habits.push({name,frequency:freq,days:[false,false,false,false,false,false,false]});
  if(!ht[_habViewWeek])ht[_habViewWeek]={habits,intention:"",learned:"",felt:"",belief:""};
  else ht[_habViewWeek].habits=habits;
  renderHabits();
}

function removeHabit(idx){
  const habits=getHabits(_habViewWeek);
  habits.splice(idx,1);
  if(ht[_habViewWeek])ht[_habViewWeek].habits=habits;
  renderHabits();
}

async function saveHabits(){
  const habits=getHabits(_habViewWeek);// FIX: read from state, not DOM
  const btn=document.getElementById("btn-program-week");
  btn.disabled=true;btn.textContent=lang==='es'?'Guardando...':'Saving...';
  try{
    const existing=ht[_habViewWeek]||{};
    const{data,error}=await sb.from("habit_tracker").upsert({

      felt:existing.felt||"",belief:existing.belief||"",

    },{onConflict:"user_id,week"}).select().single();

    ht[_habViewWeek]=data;
    toast(lang==='es'?'Semana guardada \u2713':'Week saved \u2713',"ok");
  }finally{btn.disabled=false;btn.textContent=lang==='es'?'Guardar semana':'Save week';}
}

async function evaluateWeek(){
  const habits=getHabits(_habViewWeek);
  if(!habits.length){toast(lang==='es'?'Agrega h\u00E1bitos primero':'Add habits first',"err");return;}
  const btn=document.getElementById("btn-evaluate-week");
  btn.disabled=true;btn.textContent=lang==='es'?'Guardando...':'Saving...';
  try{
    const existing=ht[_habViewWeek]||{};
    const{data,error}=await sb.from("habit_tracker").upsert({
      user_id:user.id,week:_habViewWeek,habits,
      intention:existing.intention||"",learned:existing.learned||"",
      felt:existing.felt||"",belief:existing.belief||"",
      updated_at:new Date().toISOString()
    },{onConflict:"user_id,week"}).select().single();
    if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
    ht[_habViewWeek]=data;
    const totalHabits=habits.length;
    const fulfilled=habits.filter(h=>(h.days||[]).filter(Boolean).length>=(h.frequency||7)).length;
    const coherence=calcCoherence(_habViewWeek);
    toast(`${lang==='es'?'Coherencia':'Coherence'}: ${coherence}% \u2014 ${fulfilled}/${totalHabits} ${lang==='es'?'completos':'completed'}`,"ok");
    renderHabits();
    // Ofrecer copiar h\u00E1bitos a siguiente semana
    const nextW=_habViewWeek+1;
    if(nextW<=16&&!getHabits(nextW).length){
      setTimeout(()=>{
        const msg=lang==='es'
          ?`\u00BFCopiar estos ${habits.length} h\u00E1bitos a la semana ${nextW}?`
          :`Copy these ${habits.length} habits to week ${nextW}?`;
        if(confirm(msg))copyHabitsFromWeek(_habViewWeek,nextW);
      },600);
    }
  }finally{btn.disabled=false;btn.textContent=lang==='es'?'Evaluar':'Evaluate';}
}

async function copyHabitsFromWeek(fromWeek,toWeek){
  toWeek=toWeek||_habViewWeek;
  const srcHabits=getHabits(fromWeek);
  if(!srcHabits.length){toast(lang==='es'?'No hay h\u00E1bitos en la semana '+fromWeek:'No habits found in week '+fromWeek,"err");return;}
  // Clonar h\u00E1bitos reseteando los d\u00EDas marcados
  const cloned=srcHabits.map(h=>({name:h.name,frequency:h.frequency||7,days:[false,false,false,false,false,false,false]}));
  if(!ht[toWeek])ht[toWeek]={habits:[],intention:"",learned:"",felt:"",belief:""};
  ht[toWeek].habits=cloned;
  // Guardar en Supabase
  try{
    const existing=ht[toWeek]||{};
    const{data,error}=await sb.from("habit_tracker").upsert({
      user_id:user.id,week:toWeek,habits:cloned,
      intention:existing.intention||"",learned:existing.learned||"",
      felt:existing.felt||"",belief:existing.belief||"",
      updated_at:new Date().toISOString()
    },{onConflict:"user_id,week"}).select().single();
    if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
    ht[toWeek]=data;
    toast(lang==='es'?`\u2713 ${cloned.length} h\u00E1bitos copiados a semana ${toWeek}`:`\u2713 ${cloned.length} habits copied to week ${toWeek}`,"ok");
    _habViewWeek=toWeek;
    renderHabits();
  }catch(e){toast(e.message,"err");}
}

function useChip(btn){
  document.getElementById("chat-input").value=btn.textContent;
  sendMsg();
}

async function sendMsg(){
  if(chatLocked)return;
  const inp=document.getElementById("chat-input");
  const msg=inp.value.trim();if(!msg)return;inp.value="";
  chatHistory.push({role:"user",content:msg});
  const msgEl=document.getElementById("chat-messages");
  msgEl.innerHTML+=`<div class="chat-msg user">${san(msg)}</div>`;
  msgEl.innerHTML+=`<div class="chat-msg assistant typing-indicator" id="typing"><span></span><span></span><span></span></div>`;
  msgEl.scrollTop=msgEl.scrollHeight;
  chatLocked=true;
  try{
    const{data:{session}}=await sb.auth.getSession();
    const token=session?.access_token;
    if(!token){toast(lang==='es'?'Tu sesi\u00F3n expir\u00F3. Vuelve a iniciar sesi\u00F3n.':'Session expired. Please log in again.','err');chatLocked=false;document.getElementById("typing")?.remove();return;}
    const body={messages:chatHistory.slice(-20)};
    if(aiCfg?.system_prompt)body.system=aiCfg.system_prompt;
    const res=await fetch(SU+"/functions/v1/coach-maat",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token,"apikey":SK},
      body:JSON.stringify(body)
    });
    const json=await res.json();
    if(!res.ok){throw new Error(json.error||'Error del servidor ('+res.status+')');}
    const reply=json.reply||json.content||json.message||"...";
    chatHistory.push({role:"assistant",content:reply});
    try{localStorage.setItem("maat-chat-"+user?.id,JSON.stringify(chatHistory.slice(-20)));}catch(e){}
    saveChatServer();
    document.getElementById("typing")?.remove();
    msgEl.innerHTML+=`<div class="chat-msg assistant">${san(reply)}</div>`;
  }catch(e){
    document.getElementById("typing")?.remove();
    msgEl.innerHTML+=`<div class="chat-msg assistant" style="color:var(--r)">Error: ${san(e.message)}</div>`;
  }finally{chatLocked=false;msgEl.scrollTop=msgEl.scrollHeight;}
}

function renderStatement(){
  const stmt=sh?.statement||"";
  const audioUrl=sh?.audio_url||"";
  const audioName=sh?.audio_name||"";
  document.getElementById("v-statement").innerHTML=`
    <div class="sv-header"><button class="btn-back" onclick="gv('v-mas')">\u2039</button><h2>${t("statement_title")}</h2></div>
    <p style="font-size:14px;color:var(--mu);margin:0 0 16px;line-height:1.6;">${lang==='es'?'Tu statement es la declaraci\u00F3n de qui\u00E9n eliges ser. Escr\u00EDbelo, l\u00E9elo cada d\u00EDa y escucha el audio de hipnosis para anclar esa identidad en tu mente subconsciente. La repetici\u00F3n consciente crea cambio real.':'Your statement is the declaration of who you choose to be. Write it, read it daily, and listen to the hypnosis audio to anchor that identity in your subconscious mind. Conscious repetition creates real change.'}</p>
    <div class="card">
      <textarea id="stmt-text" rows="6" placeholder="${t("statement_placeholder")}">${san(stmt)}</textarea>
      <button class="btn-action" onclick="saveStatement()">${t("save")}</button>
    </div>
    <h3 style="font-family:var(--font-title);font-size:18px;margin:20px 0 12px;">\u{1F3A7} ${t("audio_hipnosis")}</h3>
    <div class="audio-player" id="hip-player">
      ${audioUrl?`
        <p class="text-mu mb-8" style="font-size:12px;">${san(audioName)}</p>
        <audio id="hip-native" controls preload="auto" style="width:100%;margin:12px 0;border-radius:8px;height:42px;"></audio>
        <p id="hip-error" style="display:none;color:var(--r);font-size:12px;margin-top:8px;"></p>
      `:`<p class="text-mu">${lang==='es'?'Sube un audio para comenzar':'Upload audio to start'}</p>`}
    </div>
    <div class="card">
      <label class="field-label">${t("upload_audio")}</label>
      <input type="file" accept="audio/mpeg,audio/mp3,audio/*" id="hip-upload" onchange="uploadAudio()" style="color:var(--text);">
    </div>
  `;

  // FIX: native <audio> element is for Statement view only
  // Home view uses Audio_ manager with key 'hip' independently
  if(audioUrl){
    const audioEl=document.getElementById("hip-native");
    if(audioEl){
      let _retried=false;
      audioEl.addEventListener("error",async()=>{
        if(_retried)return;_retried=true;
        try{
          const u=new URL(audioUrl);
          const pm=u.pathname.match(/\/object\/public\/hipnosis\/(.+)/);
          if(pm){
            const{data:sd}=await sb.storage.from("hipnosis").createSignedUrl(decodeURIComponent(pm[1]),86400);
            if(sd?.signedUrl){audioEl.src=sd.signedUrl;audioEl.load();return;}
          }
        }catch(e){console.error("Signed URL fallback failed:",e);}
        const errEl=document.getElementById("hip-error");
        if(errEl){errEl.style.display="block";errEl.textContent="No se pudo cargar el audio.";}
      },{once:true});
      audioEl.src=audioUrl;
      audioEl.load();
    }
  }
}

async function saveStatement(){
  const text=document.getElementById("stmt-text").value.trim();
  const{data,error}=await sb.from("statement_hipnosis").upsert({
    user_id:user.id,statement:text,audio_url:sh?.audio_url||null,
    audio_name:sh?.audio_name||null,updated_at:new Date().toISOString()
  },{onConflict:"user_id"}).select().single();
  if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
  sh=data;toast(t("saved"),"ok");renderHome();
}

async function uploadAudio(){
  const file=document.getElementById("hip-upload").files[0];
  if(!file)return;
  if(!file.type.includes("audio")&&!file.name.endsWith(".mp3")){toast(lang==='es'?"Solo archivos de audio":"Only audio files","err");return;}
  toast(lang==='es'?"Subiendo audio...":"Uploading audio...","");
  const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'');
  const path=`${user.id}/${Date.now()}_${safeName}`;
  const{error:upErr}=await sb.storage.from("hipnosis").upload(path,file,{upsert:true,contentType:"audio/mpeg",cacheControl:"3600"});
  if(upErr){toast("Error subida: "+upErr.message,"err");return;}
  const{data:urlData}=sb.storage.from("hipnosis").getPublicUrl(path);
  let audioUrl=urlData?.publicUrl||"";
  // Verify public URL
  let urlWorks=false;
  try{const test=await fetch(audioUrl,{method:"HEAD"});urlWorks=test.ok;}catch(e){}
  if(!urlWorks){
    const{data:signedData,error:signedErr}=await sb.storage.from("hipnosis").createSignedUrl(path,31536000);
    if(!signedErr&&signedData?.signedUrl)audioUrl=signedData.signedUrl;
    else{toast("Error: no se pudo generar URL del audio","err");return;}
  }
  const{data,error}=await sb.from("statement_hipnosis").upsert({
    user_id:user.id,audio_url:audioUrl,audio_name:file.name,
    statement:sh?.statement||"",updated_at:new Date().toISOString()
  },{onConflict:"user_id"}).select().single();
  if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
  sh=data;
  // Reset audio manager for 'hip' key so it reloads with new URL
  if(Audio_._store?.hip){Audio_._store.hip.pause();delete Audio_._store.hip;}
  renderStatement();
  toast(t("saved"),"ok");
}

<p>El nivel de actitud que registras al final (1-10) no es una nota. Es un <em>termostato interior</em>: te dice desde qu\u00E9 energ\u00EDa est\u00E1s eligiendo operar.</p>`,
          body_en:`<p>A pilot does not fly without checking instruments. A surgeon does not operate without knowing the patient's history. You cannot live your best day without knowing where you are starting from.</p>
<p>The <strong>daily calibration</strong> is the most powerful ritual of the MAAT method. Three questions, two minutes, one habit that transforms how you approach every day.</p>
<h4>The three questions</h4>
<ol>
<li><strong>What am I genuinely grateful for today?</strong> \u2014 Gratitude is not forced optimism. It is a cognitive act that trains the brain to seek resources instead of threats.</li>
<li><strong>What belief will lead my day?</strong> \u2014 Every day operates from a dominant belief. If you do not choose it, your environment will.</li>
<li><strong>What am I avoiding facing today?</strong> \u2014 Avoidance is the main cause of stagnation. Naming it is the first step to solving it.</li>
</ol>`
        },
        {
          id:"1-3",
          title_es:"El Sistema de Creencias",title_en:"The Belief System",
          time:7,
          body_es:`<p>Tus creencias son el c\u00F3digo fuente de tu vida. Determinan lo que percibes como posible, lo que toleras, lo que persigues, y c\u00F3mo interpretas cada experiencia.</p>
<p>El problema no es tener creencias limitantes \u2014 todos las tenemos. El problema es no verlas.</p>
<h4>Las cinco categor\u00EDas</h4>
<ul>
<li><strong style="color:#D76B6E">Supervivencia</strong> \u2014 Creencias que operan desde el miedo. Protegen pero paralizan: "No soy suficiente", "El mundo es peligroso".</li>
<li><strong style="color:#EBA055">Limitante</strong> \u2014 Creencias que reducen tu campo de acci\u00F3n: "Yo no sirvo para eso", "La gente como yo no llega tan lejos".</li>
<li><strong style="color:#8892a4">Neutral</strong> \u2014 Creencias descriptivas sin carga emocional fuerte.</li>
<li><strong style="color:#39A1C9">Elegida</strong> \u2014 Creencias que has decidido adoptar conscientemente como parte de tu identidad.</li>
<li><strong style="color:#7DCD93">Expansiva</strong> \u2014 Creencias que abren posibilidades y multiplican tu energ\u00EDa: "Estoy hecho para esto", "Cada obst\u00E1culo me hace mejor".</li>
</ul>
<p>El ejercicio de esta fase es simple: empieza a <em>ver</em> tus creencias. Reg\u00EDstralas. Clasif\u00EDcalas. No las juzgues. El primer paso del cambio es la consciencia.</p>
<blockquote>"El hombre no es perturbado por los eventos, sino por las opiniones que tiene sobre ellos." \u2014 Epicteto</blockquote>`,
          body_en:`<p>Your beliefs are the source code of your life. They determine what you perceive as possible, what you tolerate, what you pursue, and how you interpret every experience.</p>
<h4>The five categories</h4>
<ul>
<li><strong style="color:#D76B6E">Survival</strong> \u2014 Beliefs that operate from fear. They protect but paralyze.</li>
<li><strong style="color:#EBA055">Limiting</strong> \u2014 Beliefs that reduce your field of action.</li>
<li><strong style="color:#8892a4">Neutral</strong> \u2014 Descriptive beliefs without strong emotional charge.</li>
<li><strong style="color:#39A1C9">Chosen</strong> \u2014 Beliefs you have consciously decided to adopt.</li>
<li><strong style="color:#7DCD93">Expansive</strong> \u2014 Beliefs that open possibilities and multiply your energy.</li>
</ul>
<blockquote>"Man is not disturbed by events, but by the opinions he has about them." \u2014 Epictetus</blockquote>`
        }
      ]
    },
    {
      id:2,color:"var(--phase2)",hex:"#EBA055",
      name_es:"FASE 2 \u2014 AMOR",name_en:"PHASE 2 \u2014 LOVE",
      keyword:"REWRITE",weeks:"Semanas 5-8",
      chapters:[
        {
          id:"2-1",
          title_es:"Reescribir la Historia",title_en:"Rewriting the Story",
          time:6,
          body_es:`<p>Si la Fase 1 fue sobre ver, la Fase 2 es sobre <strong>elegir cu\u00E1l historia sigues contando</strong>. Cada persona tiene una narrativa interna: el relato que se hace sobre qui\u00E9n es, qu\u00E9 merece, qu\u00E9 puede lograr.</p>
<p>El <strong>amor</strong> en este contexto no es sentimentalismo. Es la decisi\u00F3n radical de relacionarte contigo mismo desde la elecci\u00F3n y no desde el juicio. Es el motor que hace sostenible cualquier transformaci\u00F3n.</p>
<h4>Por qu\u00E9 el amor es el motor del alto rendimiento</h4>
<p>La autocr\u00EDtica sin compasi\u00F3n no produce excelencia \u2014 produce agotamiento. Los profesionales de alto rendimiento que sostienen resultados en el tiempo no lo hacen a base de flagelarse. Lo hacen desde una relaci\u00F3n de alta exigencia y alta compasi\u00F3n consigo mismos.</p>
<blockquote>"No puedes dar lo que no tienes. Y no puedes construir desde un lugar que desprecias." \u2014 M\u00E9todo MAAT</blockquote>`,
          body_en:`<p>If Phase 1 was about seeing, Phase 2 is about <strong>choosing which story you keep telling</strong>. Every person has an internal narrative: the story they tell about who they are, what they deserve, what they can achieve.</p>
<p><strong>Love</strong> in this context is not sentimentality. It is the radical decision to relate to yourself from choice, not judgment. It is the engine that makes any transformation sustainable.</p>
<blockquote>"You cannot give what you do not have. And you cannot build from a place you despise." \u2014 MAAT Method</blockquote>`
        },
        {
          id:"2-2",
          title_es:"El Statement de Vida",title_en:"The Life Statement",
          time:5,
          body_es:`<p>Tu <strong>statement de vida</strong> no es un eslogan motivacional. Es una declaraci\u00F3n de identidad: qui\u00E9n eliges ser independientemente de las circunstancias.</p>
<p>La diferencia entre un objetivo y un statement es fundamental. Un objetivo describe lo que quieres tener o hacer. Un statement describe qui\u00E9n eres. Y las personas act\u00FAan consistentemente con su identidad \u2014 no con sus metas.</p>
<h4>C\u00F3mo construir tu statement</h4>
<p>Un buen statement responde estas preguntas en una sola declaraci\u00F3n:</p>
<ul>
<li>\u00BFQui\u00E9n elijo ser?</li>
<li>\u00BFDesde qu\u00E9 valores opero?</li>
<li>\u00BFCu\u00E1l es mi contribuci\u00F3n al mundo?</li>
</ul>
<p>Ejemplo: <em>"Soy un l\u00EDder que transforma entornos desde la honestidad y la calma. Mi presencia eleva a los que me rodean. Construyo legado a trav\u00E9s de la coherencia."</em></p>
<p>Escribir tu statement y leerlo cada d\u00EDa no es un ritual m\u00EDstico. Es <strong>programaci\u00F3n intencional</strong> de tu sistema de filtraci\u00F3n cognitiva.</p>`,
          body_en:`<p>Your <strong>life statement</strong> is not a motivational slogan. It is an identity declaration: who you choose to be regardless of circumstances.</p>
<p>The difference between a goal and a statement is fundamental. A goal describes what you want to have or do. A statement describes who you are. And people act consistently with their identity \u2014 not their goals.</p>
<h4>How to build your statement</h4>
<ul>
<li>Who do I choose to be?</li>
<li>From what values do I operate?</li>
<li>What is my contribution to the world?</li>
</ul>
<p>Writing your statement and reading it daily is <strong>intentional programming</strong> of your cognitive filtering system.</p>`
        }
      ]
    },
    {
      id:3,color:"var(--phase3)",hex:"#7DCD93",
      name_es:"FASE 3 \u2014 INTENCI\u00D3N",name_en:"PHASE 3 \u2014 INTENTION",
      keyword:"REBUILD",weeks:"Semanas 9-12",
      chapters:[
        {
          id:"3-1",
          title_es:"La Arquitectura de los H\u00E1bitos",title_en:"The Architecture of Habits",
          time:7,
          body_es:`<p>En la Fase 3, dejas de solo observar y reescribir. Empiezas a <strong>construir</strong>. Y la herramienta m\u00E1s poderosa para construir una identidad es el h\u00E1bito.</p>
<p>Un h\u00E1bito no es simplemente una acci\u00F3n repetida. Es una declaraci\u00F3n de qui\u00E9n eres. Cada vez que haces ejercicio, est\u00E1s votando por la identidad de "persona que cuida su cuerpo". Cada vez que lees, est\u00E1s votando por "persona que aprende". Los h\u00E1bitos son votos de identidad acumulados.</p>
<h4>Dise\u00F1ando h\u00E1bitos que se sostienen</h4>
<p>La mayor\u00EDa de las personas fracasan con los h\u00E1bitos porque los dise\u00F1an mal. Los errores m\u00E1s comunes:</p>
<ul>
<li><strong>Demasiado grandes al inicio.</strong> Un h\u00E1bito de 2 minutos que se sostiene vale m\u00E1s que uno de 2 horas que se abandona.</li>
<li><strong>Sin anclaje.</strong> Un h\u00E1bito necesita un disparador claro: \u00BFdesppu\u00E9s de qu\u00E9 lo haces?</li>
<li><strong>Sin seguimiento.</strong> Lo que no se mide no existe. El \u00EDndice de coherencia en MAAT es tu sistema de seguimiento.</li>
</ul>
<h4>El \u00EDndice de coherencia</h4>
<p>La coherencia no mide perfeccionismo. Mide la brecha entre qui\u00E9n dices que eres y c\u00F3mo vives. Un 70% de coherencia no es fracaso \u2014 es datos. Te dice qu\u00E9 ajustar, no por qu\u00E9 castigarte.</p>`,
          body_en:`<p>In Phase 3, you stop just observing and rewriting. You start <strong>building</strong>. And the most powerful tool for building an identity is habit.</p>
<p>A habit is not simply a repeated action. It is a declaration of who you are. Every time you exercise, you vote for the identity of "person who takes care of their body."</p>
<h4>Designing habits that last</h4>
<ul>
<li><strong>Too big at the start.</strong> A 2-minute habit that holds is worth more than a 2-hour one that is abandoned.</li>
<li><strong>No anchor.</strong> A habit needs a clear trigger: after what do you do it?</li>
<li><strong>No tracking.</strong> What is not measured does not exist.</li>
</ul>`
        },
        {
          id:"3-2",
          title_es:"Coherencia vs. Perfeccionismo",title_en:"Coherence vs. Perfectionism",
          time:5,
          body_es:`<p>El perfeccionismo es el enemigo disfrazado de excelencia. Parece que te ayuda a mejorar, pero en realidad paraliza. Exige que todo sea perfecto antes de empezar, y castiga cualquier desliz como un fracaso total.</p>
<p>La <strong>coherencia</strong> opera de manera diferente. No pregunta "\u00BFfui perfecto?". Pregunta "\u00BFestuve alineado con qui\u00E9n quiero ser?"</p>
<h4>La regla del nunca dos veces</h4>
<p>James Clear lo expresa perfectamente: el primer error no te destruye. El segundo s\u00ED puede iniciar un patr\u00F3n. Si pierdes un d\u00EDa de h\u00E1bito, nunca pierdas dos seguidos. Esa es la regla m\u00E1s pr\u00E1ctica del sistema MAAT.</p>
<p>La coherencia del 80% sostenida durante 16 semanas produce m\u00E1s resultados que la perfeccion del 100% durante 3 semanas y el abandono.</p>
<blockquote>"No tienes que hacerlo perfecto. Tienes que hacerlo tuyo." \u2014 M\u00E9todo MAAT</blockquote>`,
          body_en:`<p>Perfectionism is the enemy disguised as excellence. It seems to help you improve, but it actually paralyzes. It demands everything be perfect before starting, and punishes any slip as total failure.</p>
<p><strong>Coherence</strong> operates differently. It does not ask "was I perfect?" It asks "was I aligned with who I want to be?"</p>
<h4>The never-twice rule</h4>
<p>If you miss one day of a habit, never miss two in a row. That is the most practical rule of the MAAT system.</p>
<blockquote>"You do not have to do it perfectly. You have to make it yours." \u2014 MAAT Method</blockquote>`
        }
      ]
    },
    {
      id:4,color:"var(--phase4)",hex:"#89608E",
      name_es:"FASE 4 \u2014 VOLUNTAD",name_en:"PHASE 4 \u2014 WILL",
      keyword:"INTEGRATE",weeks:"Semanas 13-16",
      chapters:[
        {
          id:"4-1",
          title_es:"No Fuerza \u2014 Coherencia",title_en:"Not Force \u2014 Coherence",
          time:6,
          body_es:`<p>Llegaste a la Fase 4. Has visto qui\u00E9n eres (UNCOVER), has reescrito tu historia (REWRITE), has construido nuevos h\u00E1bitos (REBUILD). Ahora viene lo m\u00E1s profundo: <strong>integrar todo en una forma de ser.</strong></p>
<p>La voluntad que MAAT propone no es la fuerza de voluntad convencional \u2014 ese recurso limitado que se agota. Es algo diferente: la capacidad de operar desde tu identidad elegida incluso cuando el entorno presiona en otra direcci\u00F3n.</p>
<h4>La diferencia entre fuerza y coherencia</h4>
<p>La fuerza dice: "Debo hacer esto aunque no quiera."<br>La coherencia dice: "Hago esto porque es quien soy."</p>
<p>Cuando un h\u00E1bito opera desde la identidad, ya no requiere fuerza de voluntad. Se convierte en una expresi\u00F3n natural de quien eres. Ese es el estado al que aspira la Fase 4.</p>
<blockquote>"Primero formamos nuestros h\u00E1bitos, luego nuestros h\u00E1bitos nos forman a nosotros." \u2014 John Dryden</blockquote>`,
          body_en:`<p>You have arrived at Phase 4. You have seen who you are (UNCOVER), rewritten your story (REWRITE), built new habits (REBUILD). Now comes the deepest part: <strong>integrating everything into a way of being.</strong></p>
<h4>The difference between force and coherence</h4>
<p>Force says: "I must do this even if I do not want to."<br>Coherence says: "I do this because it is who I am."</p>
<p>When a habit operates from identity, it no longer requires willpower. It becomes a natural expression of who you are.</p>
<blockquote>"First we form our habits, then our habits form us." \u2014 John Dryden</blockquote>`
        },
        {
          id:"4-2",
          title_es:"El Legado como Brujula",title_en:"Legacy as a Compass",
          time:5,
          body_es:`<p>La pregunta final del m\u00E9todo MAAT no es "\u00BFqu\u00E9 lograr\u00E9?" sino <strong>"\u00BFqu\u00E9 quiero que digan cuando ya no est\u00E9?"</strong></p>
<p>El legado no es lo que dejas cuando mueres. Es lo que construyes cada d\u00EDa con la forma en que tratas a las personas, las decisiones que tomas, la integridad con la que operas.</p>
<h4>Integraci\u00F3n final</h4>
<p>Al completar las 16 semanas, tienes en tus manos un sistema completo:</p>
<ul>
<li>Un ritual diario de calibraci\u00F3n que mantiene tu mente orientada</li>
<li>Un mapa de creencias que puedes actualizar conscientemente</li>
<li>Un sistema de h\u00E1bitos alineado con tu identidad</li>
<li>Un statement que te ancla cuando el entorno presiona</li>
<li>Un \u00EDndice de coherencia que mide lo que realmente importa</li>
</ul>
<p>Esto no termina con la semana 16. Empieza aqu\u00ED.</p>
<blockquote>"El viaje de mil millas comienza con un solo paso." \u2014 Lao-Tse</blockquote>`,
          body_en:`<p>The final question of the MAAT method is not "what will I achieve?" but <strong>"what do I want them to say when I am gone?"</strong></p>
<p>Legacy is not what you leave when you die. It is what you build every day with how you treat people, the decisions you make, the integrity with which you operate.</p>
<h4>Final integration</h4>
<p>Upon completing the 16 weeks, you have a complete system in your hands:</p>
<ul>
<li>A daily calibration ritual that keeps your mind oriented</li>
<li>A belief map you can update consciously</li>
<li>A habit system aligned with your identity</li>
<li>A statement that anchors you when the environment pressures</li>
<li>A coherence index that measures what truly matters</li>
</ul>
<blockquote>"A journey of a thousand miles begins with a single step." \u2014 Lao Tzu</blockquote>`
        }
      ]
    }
  ]
};

let _bookPhase=1,_bookChapter=null,_bookFontSize=16;

function renderLibro(){
  const readKey='maat-book-read-'+(user?.id||'x');
  let readSet;
  try{readSet=new Set(JSON.parse(localStorage.getItem(readKey)||'[]'));}catch(e){readSet=new Set();}

  const ph=BOOK.phases.find(p=>p.id===_bookPhase)||BOOK.phases[0];
  const totalChapters=BOOK.phases.reduce((s,p)=>s+p.chapters.length,0);
  const readCount=readSet.size;

  document.getElementById("v-libro").innerHTML=`
    <div class="sv-header">
      <button class="btn-back" onclick="gv('v-mas')">\u2039</button>
      <h2>${lang==='es'?'Libro MAAT':'MAAT Book'}</h2>
      <span style="margin-left:auto;font-size:12px;color:var(--mu);background:var(--bg2);padding:4px 10px;border-radius:12px;">${readCount}/${totalChapters} \u2713</span>
    </div>

    <!-- PHASE TABS -->
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;">
      ${BOOK.phases.map(p=>`
        <button onclick="_bookPhase=${p.id};renderLibro()" style="flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid ${_bookPhase===p.id?p.hex:'var(--bd)'};background:${_bookPhase===p.id?p.hex+'22':'var(--bg2)'};color:${_bookPhase===p.id?p.hex:'var(--mu)'};font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font-title);letter-spacing:.5px;">
          ${lang==='es'?p.name_es.split('\u2014')[1]?.trim()||p.name_es:p.name_en.split('\u2014')[1]?.trim()||p.name_en}
        </button>
      `).join('')}
    </div>

    <!-- PHASE HEADER -->
    <div style="padding:16px;background:${ph.hex}18;border:1px solid ${ph.hex}44;border-radius:var(--radius);margin-bottom:16px;">
      <div style="font-family:var(--font-title);font-size:11px;letter-spacing:2px;color:${ph.color};margin-bottom:4px;">${ph.keyword} \u00B7 ${ph.weeks}</div>
      <div style="font-family:var(--font-title);font-size:20px;font-weight:700;color:${ph.color};">${lang==='es'?ph.name_es:ph.name_en}</div>
    </div>

    <!-- CHAPTER LIST -->
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${ph.chapters.map(ch=>{
        const isRead=readSet.has(ch.id);
        return`<div onclick="_bookChapter='${ch.id}';_bookPhase=${ph.id};openBookChapter()" style="background:var(--bg2);border:1px solid ${isRead?ph.hex+'66':'var(--bd)'};border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;">
          <div style="width:28px;height:28px;border-radius:50%;border:2px solid ${isRead?ph.hex:'var(--bd)'};background:${isRead?ph.hex+'22':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${isRead?ph.hex:'var(--mu)'};font-size:14px;">${isRead?'\u2713':''}</div>
          <div style="flex:1;">
            <div style="font-weight:600;font-size:14px;margin-bottom:2px;">${lang==='es'?ch.title_es:ch.title_en}</div>
            <div style="font-size:12px;color:var(--mu);">${ch.time} min \u00B7 ${isRead?(lang==='es'?'Le\u00EDdo':'Read'):(lang==='es'?'Sin leer':'Unread')}</div>
          </div>
          <span style="color:var(--mu);font-size:18px;">\u203A</span>
        </div>`;
      }).join('')}
    </div>
  `;
}

function openBookChapter(){
  const ph=BOOK.phases.find(p=>p.id===_bookPhase);
  if(!ph)return;
  const ch=ph.chapters.find(c=>c.id===_bookChapter);
  if(!ch)return;
  const readKey='maat-book-read-'+(user?.id||'x');
  let readSet;
  try{readSet=new Set(JSON.parse(localStorage.getItem(readKey)||'[]'));}catch(e){readSet=new Set();}
  const isRead=readSet.has(ch.id);
  const body=lang==='es'?ch.body_es:ch.body_en;
  const allChapters=BOOK.phases.flatMap(p=>p.chapters.map(c=>({...c,phaseId:p.id})));
  const idx=allChapters.findIndex(c=>c.id===ch.id);
  const prev=allChapters[idx-1];
  const next=allChapters[idx+1];

  document.getElementById("v-libro").innerHTML=`
    <!-- READING HEADER -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <button style="background:none;border:none;color:var(--c);font-size:22px;cursor:pointer;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;" onclick="renderLibro()">\u2039</button>
      <div style="flex:1;">
        <div style="font-size:11px;color:${ph.color};font-family:var(--font-title);font-weight:600;letter-spacing:1px;">${lang==='es'?ph.name_es:ph.name_en}</div>
        <div style="font-size:16px;font-weight:700;">${lang==='es'?ch.title_es:ch.title_en}</div>
      </div>
    </div>

    <!-- FONT CONTROLS -->
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:20px;">
      <span style="font-size:12px;color:var(--mu);">Aa</span>
      <button onclick="_bookFontSize=Math.max(13,_bookFontSize-1);document.getElementById('book-body').style.fontSize=_bookFontSize+'px'" style="width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--text);cursor:pointer;font-size:16px;">-</button>
      <button onclick="_bookFontSize=Math.min(22,_bookFontSize+1);document.getElementById('book-body').style.fontSize=_bookFontSize+'px'" style="width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--text);cursor:pointer;font-size:16px;">+</button>
      <span style="font-size:12px;color:var(--mu);">${ch.time} min</span>
    </div>

    <!-- BOOK BODY -->
    <div id="book-body" style="font-size:${_bookFontSize}px;line-height:1.85;color:var(--text);padding-bottom:24px;">
      ${body}
    </div>

    <!-- MARK AS READ -->
    <div style="padding:16px 0;border-top:1px solid var(--bd);margin-top:8px;display:flex;flex-direction:column;gap:10px;">
      <button onclick="markChapterRead('${ch.id}')" style="width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:${isRead?'var(--bg2)':'var(--m)'};color:${isRead?'var(--mu)':'#fff'};font-family:var(--font-title);font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;" id="btn-mark-read">
        ${isRead?(lang==='es'?'\u2713 Le\u00EDdo':'\u2713 Read'):(lang==='es'?'Marcar como le\u00EDdo':'Mark as read')}
      </button>
      <div style="display:flex;gap:8px;">
        ${prev?`<button onclick="_bookChapter='${prev.id}';_bookPhase=${prev.phaseId};openBookChapter()" style="flex:1;padding:10px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);cursor:pointer;font-size:13px;">\u2190 ${lang==='es'?'Anterior':'Previous'}</button>`:'<div style="flex:1;"></div>'}
        ${next?`<button onclick="_bookChapter='${next.id}';_bookPhase=${next.phaseId};openBookChapter()" style="flex:1;padding:10px;border:1px solid ${ph.hex};border-radius:var(--radius-sm);background:${ph.hex}22;color:${ph.color};cursor:pointer;font-size:13px;font-weight:600;">${lang==='es'?'Siguiente':'Next'} \u2192</button>`:'<div style="flex:1;"></div>'}
      </div>
    </div>
  `;
  document.querySelector('.main-content')?.scrollTo({top:0,behavior:'instant'});
}

function markChapterRead(chId){
  const readKey='maat-book-read-'+(user?.id||'x');
  let readSet;

function loadAdobePDF(){
  // Caso 1: SDK ya listo (segunda visita a la vista)
  if(window.AdobeDC){setTimeout(initAdobePDF,50);return;}
  // Caso 2: Script ya en camino \u2014 solo agregar listener
  if(window._adobeSDKLoading){
    document.addEventListener('adobe_dc_view_sdk.ready',initAdobePDF,{once:true});
    return;
  }
  // Caso 3: Primera carga del SDK
  window._adobeSDKLoading=true;
  document.addEventListener('adobe_dc_view_sdk.ready',initAdobePDF,{once:true});
  const s=document.createElement('script');
  s.src='https://acrobatservices.adobe.com/view-sdk/viewer.js';
  s.onerror=()=>{
    window._adobeSDKLoading=false;
    const el=document.getElementById('adobe-pdf-loading');
    if(el)el.innerHTML=`<p style="color:var(--r);text-align:center;padding:20px;">${lang==='es'?'No se pudo cargar el lector.':'Could not load reader.'}<br><br><a href="${PDF_URL}" target="_blank" style="color:var(--c);">${lang==='es'?'Abrir PDF directamente \u2192':'Open PDF directly \u2192'}</a></p>`;
  };
  document.head.appendChild(s);
}

function initAdobePDF(){
  // Si el div ya no existe (usuario naveg\u00f3 a otra vista), salir
  const viewDiv=document.getElementById('adobe-pdf-view');
  if(!viewDiv)return;
  const loading=document.getElementById('adobe-pdf-loading');
  if(loading)loading.style.display='none';
  try{
    const view=new AdobeDC.View({clientId:ADOBE_CLIENT_ID,divId:'adobe-pdf-view'});
    view.previewFile(
      {content:{location:{url:PDF_URL}},metaData:{fileName:lang==='es'?'Libro MAAT':'MAAT Book'}},
      {
        embedMode:'SIZED_CONTAINER',
        defaultViewMode:'FIT_WIDTH',
        showAnnotationTools:false,
        showDownloadPDF:true,
        showPrintPDF:false,
        showPageControls:true,
        showThumbnails:true,
        showBookmarks:false,
        enableFormFilling:false
      }
    );
  }catch(e){
    if(viewDiv)viewDiv.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;padding:24px;text-align:center;"><p style="color:var(--r);font-weight:500;">${lang==='es'?'Error al iniciar el lector':'Error starting reader'}</p><p style="color:var(--mu);font-size:12px;max-width:280px;">${e.message||'Unknown error'}</p><a href="${PDF_URL}" target="_blank" style="color:var(--c);font-weight:500;">${lang==='es'?'Abrir PDF en nueva pesta\u00f1a \u2192':'Open PDF in new tab \u2192'}</a></div>`;

}

function closeProfile(){document.getElementById("profile-sheet").classList.remove("show");}
async function saveProfile(){
  const name=document.getElementById("prof-name").value.trim();
  const week=Math.min(16,Math.max(1,parseInt(document.getElementById("prof-week").value)||1));
  const notif=Math.min(23,Math.max(0,parseInt(document.getElementById("prof-notif").value)||9));
  const newLang=document.getElementById("prof-lang").value;
  const newTheme=document.getElementById("prof-theme").value;
  const btn=document.getElementById("btn-save-prof");
  btn.disabled=true;btn.textContent=t("saving");
  try{
    const{error}=await sb.from("profiles").update({full_name:name,current_week:week,notification_hour:notif,preferred_lang:newLang}).eq("id",user.id);
    if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
    prof.full_name=name;prof.current_week=week;prof.notification_hour=notif;prof.preferred_lang=newLang;
    hwk=week;notifHour=notif;
    localStorage.setItem("maat-lang",newLang);
    localStorage.setItem("maat-theme",newTheme);
    if(newLang!==lang)setLang(newLang);
    setTheme(newTheme);
    scheduleNotifications();
    closeProfile();
    toast(t("saved"),"ok");
    applyI18N();renderHome();
  }catch(e){toast(e.message||"Error","err");}
  finally{btn.disabled=false;btn.textContent=t("save");}
}

/* ============ SISTEMA DE NOTIFICACIONES ============ */
async function requestNotifPermission(){
  if(!("Notification" in window))return;
  if(Notification.permission==="default"){
    await Notification.requestPermission();
  }
}

let _notifTimer=null;
function scheduleNotifications(){
  if(_notifTimer)clearInterval(_notifTimer);
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  // Revisa cada minuto si es la hora configurada
  _notifTimer=setInterval(()=>{
    const now=new Date();
    if(now.getHours()!==notifHour||now.getMinutes()!==0)return;
    // \u00BFYa calibr\u00F3 hoy? \u2014 compara ambos formatos (legacy "17 mar" + ISO)
    if(!calibradoHoy()){
      try{
        new Notification(lang==="es"?"MAAT \u2014 Calibra tu d\u00EDa":"MAAT \u2014 Calibrate your day",{
          body:lang==="es"
            ?"Es tu momento de calibraci\u00F3n. 3 preguntas \u00B7 2 minutos."
            :"Time to calibrate. 3 questions \u00B7 2 minutes.",
          icon:"https://somosmaat.org/wp-content/uploads/2026/02/logo_app.png",
          tag:"maat-calib-daily",
          requireInteraction:false
        });
      }catch(e){}
    }
    // Recordatorio semanal los domingos a las 20:00
    if(now.getDay()===0&&now.getHours()===20&&now.getMinutes()===0){
      try{
        new Notification(lang==="es"?"MAAT \u2014 Resumen semanal":"MAAT \u2014 Weekly review",{
          body:lang==="es"
            ?"\u00BFEvaluaste tu semana? Revisa tus h\u00E1bitos antes de empezar la pr\u00F3xima."
            :"Did you evaluate your week? Review your habits before starting the next one.",
          icon:"https://somosmaat.org/wp-content/uploads/2026/02/logo_app.png",
          tag:"maat-weekly-summary",
          requireInteraction:false
        });
      }catch(e){}
    }
  },60000);
}

// Pull to refresh
(function initPullToRefresh(){
  const el=document.querySelector('.main-content');
  if(!el)return;
  let startY=0,pulling=false,indicator=null;
  el.addEventListener('touchstart',e=>{
    if(el.scrollTop===0)startY=e.touches[0].clientY;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!startY)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>50&&!pulling){
      pulling=true;
      if(!indicator){indicator=document.createElement('div');indicator.style.cssText='position:absolute;top:70px;left:50%;transform:translateX(-50%);font-size:20px;z-index:500;animation:spin .8s linear infinite;';indicator.textContent='\u21BB';document.querySelector('.app-shell')?.appendChild(indicator);}
    }
  },{passive:true});
  el.addEventListener('touchend',async()=>{
    if(pulling){
      pulling=false;startY=0;
      await loadData();
      renderHome();
    }
    if(indicator){indicator.remove();indicator=null;}
    startY=0;
  },{passive:true});
})();

/* ============ OFFLINE QUEUE + RETRY ============ */
const _offlineQueue=[];
function isOnline(){return navigator.onLine;}
function queueMutation(table,action,payload){
  _offlineQueue.push({table,action,payload,ts:Date.now()});
  updateQueueBadge();
  toast(lang==='es'?'Sin conexi\u00F3n \u2014 guardado para enviar despu\u00E9s':'Offline \u2014 saved to send later','err');
}
function updateQueueBadge(){
  const badge=document.getElementById("queue-badge");
  if(!badge)return;
  if(_offlineQueue.length>0){badge.textContent=(lang==='es'?'Pendientes: ':'Pending: ')+_offlineQueue.length;badge.classList.add("show");}
  else badge.classList.remove("show");
}
async function flushQueue(){
  if(!_offlineQueue.length||!isOnline())return;
  const items=[..._offlineQueue];
  _offlineQueue.length=0;
  updateQueueBadge();
  let failed=0;
  for(const item of items){
    try{
      let result;
      if(item.action==='insert')result=await sb.from(item.table).insert(item.payload);
      else if(item.action==='upsert')result=await sb.from(item.table).upsert(item.payload.data,item.payload.opts);
      else if(item.action==='update')result=await sb.from(item.table).update(item.payload.data).eq("id",item.payload.id);
      if(result?.error){failed++;console.warn("Queue flush error:",result.error);}
    }catch(e){failed++;console.warn("Queue flush exception:",e);}
  }
  if(failed>0)toast(lang==='es'?`${failed} cambio(s) no se pudieron sincronizar`:`${failed} change(s) failed to sync`,'err');
  else if(items.length>0){toast(lang==='es'?'Cambios sincronizados':'Changes synced','ok');await loadData();renderHome();}
}
async function retryFetch(fn,retries=2,delay=1500){
  for(let i=0;i<=retries;i++){
    const result=await fn();
    if(!result.error)return result;
    if(i<retries&&!chkAuthErr(result.error))await new Promise(r=>setTimeout(r,delay*(i+1)));
    else return result;
  }
}
window.addEventListener('online',()=>{
  document.getElementById("offline-banner")?.classList.remove("show");
  flushQueue();
});
window.addEventListener('offline',()=>document.getElementById("offline-banner")?.classList.add("show"));

/* ============ EXPORT PROGRESS \u2014 CSV download ============ */
function exportProgress(){
  if(!cals.length&&!bels.length){toast(lang==='es'?'No hay datos para exportar':'No data to export','err');return;}
  let csv="";
  // Calibrations
  csv+="=== "+(lang==='es'?"CALIBRACIONES":"CALIBRATIONS")+" ===\n";
  csv+=(lang==='es'?"Fecha,Semana,Actitud,Pregunta 1,Pregunta 2,Pregunta 3":"Date,Week,Attitude,Question 1,Question 2,Question 3")+"\n";
  cals.forEach(c=>{
    csv+=`"${c.date||""}",${c.week||""},${c.coherence||""},"${(c.answer_q1||"").replace(/"/g,'""')}","${(c.answer_q2||"").replace(/"/g,'""')}","${(c.answer_q3||"").replace(/"/g,'""')}"\n`;
  });
  // Habits summary
  csv+="\n=== "+(lang==='es'?"H\u00C1BITOS POR SEMANA":"HABITS BY WEEK")+" ===\n";
  csv+=(lang==='es'?"Semana,Coherencia %,H\u00E1bitos":"Week,Coherence %,Habits")+"\n";
  for(let w=1;w<=16;w++){
    const habits=getHabits(w);
    if(habits.length){
      const coh=calcCoherence(w);
      const names=habits.map(h=>h.name).join("; ");
      csv+=`${w},${coh}%,"${names}"\n`;
    }
  }
  // Beliefs
  csv+="\n=== "+(lang==='es'?"CREENCIAS":"BELIEFS")+" ===\n";
  csv+=(lang==='es'?"Texto,Categor\u00EDa,Fecha":"Text,Category,Date")+"\n";
  bels.forEach(b=>{
    csv+=`"${(b.text||"").replace(/"/g,'""')}","${b.category||""}","${b.date||""}"\n`;
  });
  // Stats summary
  csv+="\n=== "+(lang==='es'?"RESUMEN":"SUMMARY")+" ===\n";
  csv+=(lang==='es'?"M\u00E9trica,Valor":"Metric,Value")+"\n";
  csv+=`${lang==='es'?"Semana actual":"Current week"},${hwk}\n`;
  csv+=`${lang==='es'?"Racha":"Streak"},${calcStreak()}\n`;
  csv+=`${lang==='es'?"Actitud promedio":"Average attitude"},${calcAttitudeAvg()||"N/A"}\n`;
  csv+=`${lang==='es'?"Semanas completadas":"Weeks completed"},${Object.values(wkp).filter(Boolean).length}/16\n`;
  // Download
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`maat-progreso-${prof?.full_name||"user"}-${fmtDateISO()}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(lang==='es'?'Progreso exportado':'Progress exported','ok');
}
