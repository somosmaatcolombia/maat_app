<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png?v=2">
<link rel="apple-touch-icon" href="./apple-touch-icon.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MAAT">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MAAT &#8212; Calibraci&oacute;n Diaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@400;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --c:#39A1C9;--o:#EBA055;--m:#7DCD93;--v:#896C8E;--r:#D76B6E;
  --bg:#0d1117;--bg2:#161b22;--text:#e8eaf0;--mu:#b8c0cc;--mu2:#9aa0ae;
  --bd:rgba(255,255,255,0.12);
  --phase1:#39A1C9;--phase2:#EBA055;--phase3:#7DCD93;--phase4:#896C8E;
  --radius:14px;--radius-sm:8px;
  --font-title:'Saira Condensed',sans-serif;
  --font-body:'Sora',sans-serif;
  --nav-h:64px;--topbar-h:56px;
}
[data-theme="light"]{
  --bg:#f5f7fa;--bg2:#ffffff;--text:#111827;--mu:#374151;--mu2:#4b5563;
  --bd:rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--mu2);border-radius:4px;}

/* FIX: auth hidden by default &#8212; no flash */
#auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;}
#auth-screen.visible{display:flex;}
#auth-screen .logo-auth{width:120px;margin-bottom:24px;border-radius:20px;}
#auth-screen h1{font-family:var(--font-title);font-size:32px;font-weight:700;letter-spacing:1px;margin-bottom:6px;}
#auth-screen .subtitle{color:var(--mu);font-size:14px;margin-bottom:32px;}
.auth-box{width:100%;max-width:340px;}
.auth-box input{width:100%;padding:14px 16px;margin-bottom:12px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border .2s;}
.auth-box input:focus{border-color:var(--c);}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--c);color:#fff;font-family:var(--font-title);font-size:16px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity .2s;touch-action:manipulation;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
/* auth helper text */
#auth-error{color:var(--r);font-size:13px;margin-top:12px;min-height:18px;}

/* BOOT LOADER */
#boot-loader{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);}
#boot-loader .boot-dot{width:10px;height:10px;border-radius:50%;background:var(--c);animation:bootPulse .8s infinite alternate;}
#boot-loader .boot-dot:nth-child(2){animation-delay:.15s;background:var(--o);}
#boot-loader .boot-dot:nth-child(3){animation-delay:.3s;background:var(--m);}
#boot-loader{gap:8px;}
@keyframes bootPulse{to{opacity:.2;transform:scale(.6);}}

/* APP SHELL */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:90;}
.topbar .logo-small{height:28px;border-radius:6px;}
.topbar .topbar-title{font-family:var(--font-title);font-size:18px;font-weight:600;letter-spacing:.5px;}
.topbar .btn-profile{width:36px;height:36px;border-radius:50%;border:2px solid var(--c);background:var(--bg2);color:var(--c);font-family:var(--font-title);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(var(--nav-h) + 16px);scroll-behavior:smooth;}
.view{display:none;}
.view.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.sv-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.sv-header .btn-back{background:none;border:none;color:var(--c);font-size:22px;cursor:pointer;padding:10px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.sv-header h2{font-family:var(--font-title);font-size:22px;font-weight:600;}

/* NAV BAR */
.nav-bar{height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;background:var(--bg);border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;cursor:pointer;color:var(--mu);transition:color .2s;background:none;border:none;font-family:var(--font-body);font-size:11px;touch-action:manipulation;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-item.active{color:var(--c);}
.nav-item span{color:inherit;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-family:var(--font-title);font-size:16px;font-weight:600;margin-bottom:8px;letter-spacing:.3px;}
.stat-row{display:flex;gap:8px;margin-bottom:12px;}
.stat-box{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;}
.stat-box .stat-val{font-family:var(--font-title);font-size:22px;font-weight:700;}
.stat-box .stat-label{font-size:14px;color:var(--mu);margin-top:2px;}

/* FORMS */
textarea,.input-field{width:100%;padding:12px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;resize:vertical;transition:border .2s;}
textarea:focus,.input-field:focus{border-color:var(--c);}
textarea{min-height:80px;}
label.field-label{display:block;font-size:14px;color:var(--mu);margin-bottom:6px;font-weight:500;}

/* SLIDER */
.slider-wrap{margin:16px 0;}
.slider-wrap input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,var(--r),var(--o),var(--m));outline:none;}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--text);border:3px solid var(--c);cursor:pointer;}
.slider-labels{display:flex;justify-content:space-between;font-size:14px;color:var(--mu);margin-top:4px;}
.slider-val{text-align:center;font-family:var(--font-title);font-size:36px;font-weight:700;color:var(--c);}

/* BUTTONS */
.btn-action{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--c);color:#fff;font-family:var(--font-title);font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:12px;touch-action:manipulation;}
.btn-action:disabled{opacity:.5;cursor:not-allowed;}
.btn-action.secondary{background:transparent;border:1px solid var(--c);color:var(--c);}

/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;pointer-events:none;background:var(--bg2);border:1px solid var(--bd);color:var(--text);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--m);color:var(--m);}
#toast.err{border-color:var(--r);color:var(--r);}

/* HOME */
.home-greeting{font-family:var(--font-title);font-size:26px;font-weight:700;margin-bottom:4px;}
.home-week{color:var(--mu);font-size:13px;margin-bottom:16px;}
.streak-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;background:var(--bg2);border:1px solid var(--bd);font-size:14px;color:var(--o);margin-bottom:16px;}
/* OFFLINE BANNER */
#offline-banner{position:fixed;top:0;left:0;right:0;z-index:998;background:var(--r);color:#fff;text-align:center;font-size:13px;font-weight:500;padding:8px;transform:translateY(-100%);transition:transform .3s ease;}
#offline-banner.show{transform:translateY(0);}
/* PWA INSTALL BANNER */
#pwa-banner{position:fixed;bottom:calc(var(--nav-h) + 8px);left:12px;right:12px;z-index:997;background:var(--bg2);border:1px solid var(--c);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;transform:translateY(200%);transition:transform .4s ease;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#pwa-banner.show{transform:translateY(0);}
#pwa-banner p{flex:1;font-size:13px;color:var(--text);}
#pwa-banner .pwa-install{padding:8px 14px;border:none;border-radius:var(--radius-sm);background:var(--c);color:#fff;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;}
#pwa-banner .pwa-dismiss{padding:8px;border:none;background:none;color:var(--mu);font-size:18px;cursor:pointer;touch-action:manipulation;}
/* CALIB STEP INDICATOR */
.calib-steps{display:flex;align-items:center;gap:6px;margin-bottom:20px;}
.calib-step-dot{width:8px;height:8px;border-radius:50%;background:var(--bd);transition:all .3s;}
.calib-step-dot.done{background:var(--m);}
.calib-step-dot.active{background:var(--c);width:20px;border-radius:4px;}
.calib-step-label{font-size:13px;color:var(--mu);margin-left:auto;}
/* COACH CHIPS */
.coach-chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0;}
.coach-chip{padding:8px 14px;border:1px solid var(--bd);border-radius:20px;font-size:13px;color:var(--text);background:var(--bg2);cursor:pointer;transition:all .2s;touch-action:manipulation;}
.coach-chip:hover{border-color:var(--c);color:var(--c);}
/* HABIT CHECK ANIMATION */
@keyframes habitPop{0%{transform:scale(1);}40%{transform:scale(1.35);}70%{transform:scale(.92);}100%{transform:scale(1);}}
.habit-day.pop{animation:habitPop .35s ease;}
/* COHERENCE RING */
.coh-ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;margin:0 auto 4px;}
.coh-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.coh-ring-val{font-family:var(--font-title);font-size:14px;font-weight:700;position:relative;z-index:1;}
/* ONBOARDING CARD */
.onboarding-card{background:linear-gradient(135deg,rgba(57,161,201,.12),rgba(57,161,201,.04));border:1px solid rgba(57,161,201,.3);border-radius:var(--radius);padding:20px;text-align:center;margin:16px 0;}
.onboarding-card h3{font-family:var(--font-title);font-size:18px;margin-bottom:8px;color:var(--c);}
.onboarding-card p{font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:14px;}
.cta-calib{background:linear-gradient(135deg,var(--c),#2d8ab0);border-radius:var(--radius);padding:20px;text-align:center;margin:16px 0;cursor:pointer;transition:transform .15s;touch-action:manipulation;}
.cta-calib:active{transform:scale(.98);}
.cta-calib h3{font-family:var(--font-title);font-size:18px;margin-bottom:4px;}
.cta-calib p{font-size:12px;opacity:.8;}
.last-calib{font-size:14px;color:var(--mu);margin-top:8px;}
.last-calib strong{color:var(--text);}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-family:var(--font-title);font-size:14px;font-weight:600;letter-spacing:.5px;}
/* Mapa de progreso "Tu viaje MAAT" */
.journey-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px;margin-top:16px;}
.journey-title{font-family:var(--font-title);font-size:12px;font-weight:600;letter-spacing:1px;color:var(--mu);margin-bottom:12px;text-transform:uppercase;}
.journey-track{display:flex;gap:7px;margin-bottom:8px;}
.journey-phase{display:flex;gap:3px;flex:1;}
.journey-seg{flex:1;height:9px;border-radius:5px;transition:all .4s ease;}
.journey-seg.current{animation:journeyPulse 1.8s ease-in-out infinite;}
@keyframes journeyPulse{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.5);}}
.journey-labels{display:flex;gap:7px;margin-bottom:14px;}
.journey-plabel{flex:1;text-align:center;font-size:9px;color:var(--mu2);letter-spacing:.3px;transition:color .3s;}
.journey-status{font-family:var(--font-title);font-size:17px;font-weight:600;margin-bottom:5px;}
.journey-msg{font-size:13px;color:var(--mu);line-height:1.55;}

/* HABITS */
.habit-item{background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.habit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.habit-name-text{font-weight:600;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.habit-freq{font-size:14px;color:var(--mu);background:var(--bg2);padding:2px 8px;border-radius:10px;white-space:nowrap;}
.habit-days{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;}
.habit-day{min-width:34px;width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text);cursor:pointer;transition:all .15s;flex-shrink:0;touch-action:manipulation;}
.habit-day.checked{background:var(--m);color:#fff;border-color:var(--m);}
.habit-progress{height:4px;border-radius:2px;background:var(--bd);margin-top:8px;overflow:hidden;}
.habit-progress .fill{height:100%;border-radius:2px;transition:width .3s;}
.btn-del-habit{background:none;border:none;color:var(--r);cursor:pointer;font-size:14px;padding:2px 6px;flex-shrink:0;touch-action:manipulation;}
.add-habit-form{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:14px;margin-top:12px;}
.add-habit-form .row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.add-habit-form .row>div{flex:1;min-width:100px;}
.add-habit-form .row>div:last-child{flex:0 0 auto;}
.add-habit-form label{display:block;font-size:14px;color:var(--mu);margin-bottom:4px;}
.add-habit-form input,.add-habit-form select{width:100%;padding:10px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;outline:none;}
.add-habit-form button{padding:10px 16px;background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;white-space:nowrap;touch-action:manipulation;}
.coherence-big{text-align:center;padding:20px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);margin-bottom:16px;}
.coherence-big .coh-val{font-family:var(--font-title);font-size:48px;font-weight:700;}
.coherence-big .coh-label{font-size:14px;color:var(--mu);}

/* COACH */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - var(--topbar-h) - var(--nav-h) - 32px);}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px;}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:15px;line-height:1.55;word-wrap:break-word;overflow-wrap:break-word;}
.chat-msg.user{align-self:flex-end;background:var(--c);color:#fff;border-bottom-right-radius:4px;white-space:pre-wrap;}
.chat-msg.assistant{align-self:flex-start;background:var(--bg2);border:1px solid var(--bd);border-bottom-left-radius:4px;color:var(--text);}
/* Estilo de markdown renderizado dentro de las burbujas del coach */
.chat-msg.assistant p{margin:0 0 10px;}
.chat-msg.assistant p:last-child{margin-bottom:0;}
.chat-msg.assistant strong{color:var(--c);font-weight:700;}
.chat-msg.assistant em{font-style:italic;color:var(--text);}
.chat-msg.assistant h3,.chat-msg.assistant h4{font-family:var(--font-title);color:var(--text);margin:14px 0 6px;letter-spacing:.3px;line-height:1.3;}
.chat-msg.assistant h3{font-size:16px;}
.chat-msg.assistant h4{font-size:14px;}
.chat-msg.assistant h3:first-child,.chat-msg.assistant h4:first-child{margin-top:0;}
.chat-msg.assistant ul,.chat-msg.assistant ol{margin:6px 0 10px;padding-left:22px;}
.chat-msg.assistant li{margin-bottom:4px;}
.chat-msg.assistant li:last-child{margin-bottom:0;}
.chat-msg.assistant code{background:rgba(0,0,0,.25);padding:2px 6px;border-radius:4px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:13px;}
.chat-msg.assistant pre{background:rgba(0,0,0,.25);padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0;}
.chat-msg.assistant pre code{background:none;padding:0;}
.chat-msg.assistant hr{border:none;border-top:1px solid var(--bd);margin:12px 0;}
.chat-msg.assistant blockquote{border-left:3px solid var(--c);padding-left:10px;margin:6px 0;color:var(--mu);}
.chat-input-row{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--bd);margin-top:8px;}
.chat-input-row input{flex:1;padding:12px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;}
.chat-input-row button{padding:12px 16px;background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:16px;touch-action:manipulation;}
.typing-indicator{display:flex;gap:4px;padding:10px 14px;}
.typing-indicator span{width:8px;height:8px;border-radius:50%;background:var(--mu);animation:typeBounce .6s infinite alternate;}
.typing-indicator span:nth-child(2){animation-delay:.2s;}
.typing-indicator span:nth-child(3){animation-delay:.4s;}
@keyframes typeBounce{to{opacity:.3;transform:translateY(-4px);}}

/* M&Aacute;S */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.menu-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:20px 14px;text-align:center;cursor:pointer;transition:all .15s;touch-action:manipulation;}
.menu-item:active{transform:scale(.97);}
.menu-item .menu-icon{font-size:28px;margin-bottom:6px;}
.menu-item .menu-label{font-family:var(--font-title);font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--text);}

/* PROGRESO */
.phase-section{margin-bottom:20px;}
.phase-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius) var(--radius) 0 0;font-family:var(--font-title);font-size:16px;font-weight:600;}
.phase-weeks{border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.pw-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bd);}
.pw-item:last-child{border-bottom:none;}
.pw-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--mu2);flex-shrink:0;margin-top:4px;}
.pw-dot.done{border-color:var(--m);background:var(--m);}
.pw-dot.current{border-color:var(--c);background:var(--c);}
.pw-info{flex:1;cursor:pointer;}
.pw-title{font-weight:600;font-size:14px;}
.pw-summary{font-size:14px;color:var(--mu);margin-top:2px;}
.pw-edit{display:none;margin-top:10px;}
.pw-edit.open{display:block;}
.pw-edit textarea{min-height:100px;margin-bottom:8px;}
.pw-edit button{padding:8px 16px;background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;touch-action:manipulation;}

/* BELIEFS */
.belief-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.belief-filter{padding:6px 12px;border-radius:16px;border:1px solid var(--bd);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;touch-action:manipulation;}
.belief-filter.active{background:var(--c);color:#fff;border-color:var(--c);}
.belief-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius-sm);margin-bottom:8px;}
.belief-cat-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.btn-del{background:none;border:none;color:var(--r);cursor:pointer;font-size:16px;padding:4px;touch-action:manipulation;}

/* HISTORIAL */
.hist-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:12px;cursor:pointer;}
.hist-header .hist-date{font-family:var(--font-title);font-weight:600;}
.hist-header .hist-coh{padding:2px 10px;border-radius:12px;font-size:14px;font-weight:600;font-family:var(--font-title);}
.hist-body{padding:0 12px 12px;display:none;font-size:14px;color:var(--mu);}
.hist-body.open{display:block;}
.hist-body p{margin-bottom:6px;}
.hist-body strong{color:var(--text);}

/* AUDIO */
.audio-player{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:20px;text-align:center;margin:16px 0;}
.audio-player .play-btn{width:56px;height:56px;border-radius:50%;border:none;background:var(--c);color:#fff;font-size:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin:12px 0;touch-action:manipulation;}
.audio-progress{width:100%;height:4px;border-radius:2px;background:var(--bd);margin:12px 0;position:relative;cursor:pointer;}
.audio-progress .fill{height:100%;background:var(--c);border-radius:2px;transition:width .1s;}
.audio-controls{display:flex;align-items:center;justify-content:center;gap:20px;}
.audio-controls button{background:none;border:none;color:var(--mu);font-size:14px;cursor:pointer;touch-action:manipulation;}
.audio-time{font-size:14px;color:var(--mu);font-family:var(--font-title);}

/* SKELETON LOADERS */
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bd) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}
.skel-line{height:14px;margin-bottom:10px;border-radius:4px;}
.skel-line.short{width:60%;}
.skel-line.med{width:80%;}
.skel-box{height:72px;border-radius:var(--radius-sm);margin-bottom:10px;}
.skel-circle{width:56px;height:56px;border-radius:50%;margin:0 auto 8px;}
.skel-stat-row{display:flex;gap:8px;margin-bottom:12px;}
.skel-stat-row .skel-box{flex:1;}
/* FORM VALIDATION */
.field-error{border-color:var(--r) !important;}
.field-error-msg{color:var(--r);font-size:12px;margin-top:4px;}
/* ONBOARDING OVERLAY */
#onboarding-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
#onboarding-overlay.visible{display:flex;}
.ob-step{max-width:340px;animation:fadeUp .4s ease;}
.ob-icon{font-size:56px;margin-bottom:16px;}
.ob-title{font-family:var(--font-title);font-size:24px;font-weight:700;margin-bottom:8px;}
.ob-text{font-size:14px;color:var(--mu);line-height:1.7;margin-bottom:24px;}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--bd);}
.ob-dot.active{background:var(--c);width:20px;border-radius:4px;}
/* ACHIEVEMENT TOAST */
#achievement{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--bg2);border:2px solid var(--m);border-radius:var(--radius);padding:32px;text-align:center;z-index:400;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;min-width:260px;}
#achievement.show{transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
#achievement .ach-icon{font-size:48px;margin-bottom:8px;min-height:48px;display:flex;align-items:center;justify-content:center;}
#achievement .ach-icon img{max-width:160px;width:100%;height:auto;display:block;}
#achievement .ach-title{font-family:var(--font-title);font-size:20px;font-weight:700;color:var(--m);margin-bottom:4px;}
#achievement .ach-text{font-size:14px;color:var(--mu);}
/* Cierre Peak-End post-calibracion */
#calib-close{position:fixed;inset:0;background:var(--bg);z-index:450;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;opacity:0;transition:opacity .4s;}
#calib-close.show{display:flex;opacity:1;}
#calib-close .cc-inner{max-width:380px;animation:ccRise .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes ccRise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
#calib-close .cc-icon{font-size:56px;margin-bottom:16px;}
#calib-close .cc-head{font-family:var(--font-title);font-size:24px;font-weight:700;margin-bottom:12px;line-height:1.25;}
#calib-close .cc-msg{font-size:15px;color:var(--mu);line-height:1.6;margin-bottom:20px;}
#calib-close .cc-streak{display:inline-block;background:rgba(235,160,85,.15);color:var(--o);font-family:var(--font-title);font-size:14px;font-weight:600;padding:6px 16px;border-radius:20px;margin-bottom:24px;}
#calib-close .cc-ach{background:var(--bg2);border:1px solid var(--m);border-radius:var(--radius);padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;gap:12px;text-align:left;}
#calib-close .cc-ach .cca-icon{font-size:32px;flex-shrink:0;}
#calib-close .cc-ach .cca-t{font-family:var(--font-title);font-size:15px;font-weight:700;color:var(--m);}
#calib-close .cc-ach .cca-d{font-size:12px;color:var(--mu);}
#calib-close .cc-btn{background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font-title);font-size:15px;font-weight:600;letter-spacing:.5px;padding:13px 40px;cursor:pointer;touch-action:manipulation;}
/* Configurar contrase\u00F1a despu\u00E9s de activaci\u00F3n por email */
#setpass-overlay{position:fixed;inset:0;background:var(--bg);z-index:600;display:none;align-items:center;justify-content:center;padding:24px;}
#setpass-overlay.show{display:flex;}
#setpass-overlay .sp-inner{max-width:420px;width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:32px 28px;text-align:center;animation:ccRise .5s cubic-bezier(.34,1.56,.64,1);}
#setpass-overlay .sp-icon{font-size:42px;margin-bottom:12px;}
#setpass-overlay h3{font-family:var(--font-title);font-size:22px;font-weight:700;margin-bottom:8px;color:var(--text);line-height:1.25;}
#setpass-overlay .sp-msg{font-size:14px;color:var(--mu);line-height:1.55;margin-bottom:22px;}
#setpass-overlay .sp-field{margin-bottom:12px;text-align:left;}
#setpass-overlay .sp-field label{display:block;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:600;}
#setpass-overlay .sp-field input{width:100%;padding:13px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:16px;outline:none;}
#setpass-overlay .sp-field input:focus{border-color:var(--c);}
#setpass-overlay .sp-err{color:var(--r);font-size:12px;min-height:16px;margin:6px 0 14px;}
#setpass-overlay .sp-btn{width:100%;padding:14px;background:var(--c);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font-title);font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;touch-action:manipulation;}
#setpass-overlay .sp-btn:disabled{opacity:.6;cursor:not-allowed;}
#setpass-overlay .sp-hint{font-size:11px;color:var(--mu2);margin-top:14px;line-height:1.5;}

/* PROFILE SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;opacity:0;transition:opacity .3s;}
.sheet-overlay.show{display:block;opacity:1;}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:210;background:var(--bg);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 20px 40px;max-height:80vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease;}
.sheet-overlay.show .sheet{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--mu2);border-radius:2px;margin:0 auto 20px;}
.sheet h3{font-family:var(--font-title);font-size:20px;margin-bottom:16px;}
.sheet-field{margin-bottom:16px;}
.sheet-field label{display:block;font-size:14px;color:var(--mu);margin-bottom:6px;}
.sheet-field input,.sheet-field select{width:100%;padding:12px;border:1px solid var(--bd);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;}
.sheet-actions{display:flex;gap:8px;margin-top:20px;}
.sheet-actions button{flex:1;}
.btn-logout{background:var(--r) !important;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* BOOK READER */
/* PDF FULLSCREEN */
#v-pdf:fullscreen,#v-pdf:-webkit-full-screen{background:var(--bg);padding:16px;overflow-y:auto;}
#v-pdf:fullscreen #pdf-container,#v-pdf:-webkit-full-screen #pdf-container{height:calc(100vh - 120px);overflow:auto;}
#v-pdf:fullscreen #pdf-canvas,#v-pdf:-webkit-full-screen #pdf-canvas{max-width:100%;}
/* BOOK READER */
#book-body h4{font-family:var(--font-title);font-size:1.1em;font-weight:700;margin:1.2em 0 .5em;color:var(--text);}
#book-body p{margin-bottom:1em;color:var(--text);}
#book-body ul,#book-body ol{margin:0 0 1em 1.4em;color:var(--text);}
#book-body li{margin-bottom:.4em;}
#book-body blockquote{border-left:3px solid var(--c);padding:10px 16px;margin:1.2em 0;background:var(--bg2);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-style:italic;color:var(--mu);}
#book-body strong{color:var(--text);font-weight:600;}
.hidden{display:none !important;}
.mt-8{margin-top:8px;}.mt-16{margin-top:16px;}.mb-8{margin-bottom:8px;}.mb-16{margin-bottom:16px;}
.text-center{text-align:center;}.text-mu{color:var(--mu);font-size:13px;}
/* FOCUS INDICATORS &#8212; accessibility */
:focus-visible{outline:2px solid var(--c);outline-offset:2px;border-radius:4px;}
button:focus-visible,.nav-item:focus-visible,.menu-item:focus-visible{outline:2px solid var(--c);outline-offset:2px;}
input:focus-visible,textarea:focus-visible,select:focus-visible{outline:none;border-color:var(--c);box-shadow:0 0 0 2px rgba(57,161,201,.25);}
/* SKIP NAV */
.skip-nav{position:absolute;top:-100%;left:50%;transform:translateX(-50%);background:var(--c);color:#fff;padding:8px 20px;border-radius:0 0 var(--radius-sm) var(--radius-sm);z-index:999;font-size:14px;text-decoration:none;transition:top .2s;}
.skip-nav:focus{top:0;}
/* OFFLINE QUEUE BADGE */
.offline-queue-badge{position:fixed;bottom:calc(var(--nav-h) + 8px);right:12px;background:var(--o);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:12px;z-index:150;display:none;}
.offline-queue-badge.show{display:block;}
</style>
</head>

// Renderizador minimalista de Markdown -> HTML seguro (para mensajes del coach)
function mdRender(text){
  if(!text)return"";
  // 1) Escapar HTML primero
  let s=String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // 2) Bloques de c\u00F3digo triple ``` (preservar contenido)
  const codeBlocks=[];
  s=s.replace(/```([\s\S]*?)```/g,(m,c)=>{codeBlocks.push(c);return"\uE000CODE"+(codeBlocks.length-1)+"\uE000";});
  // 3) Encabezados (### \u2192 h4, ## \u2192 h3)
  s=s.replace(/^###\s+(.+)$/gm,'<h4>$1</h4>');
  s=s.replace(/^##\s+(.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^#\s+(.+)$/gm,'<h3>$1</h3>');
  // 4) Separadores horizontales --- \u00F3 ***
  s=s.replace(/^[-*]{3,}\s*$/gm,'<hr>');
  // 5) Negrita ** y __
  s=s.replace(/\*\*([^*\n]+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/__([^_\n]+?)__/g,'<strong>$1</strong>');
  // 6) Asteriscos simples \u2192 tambi\u00E9n negrita (la IA los usa as\u00ED)
  s=s.replace(/(?<![*\w])\*([^*\n]+?)\*(?!\w)/g,'<strong>$1</strong>');
  // 7) Listas con - o * (agrupa l\u00EDneas consecutivas)
  s=s.replace(/(?:^[-*]\s+.+(?:\n|$))+/gm,(block)=>{
    const items=block.trim().split('\n').map(l=>l.replace(/^[-*]\s+/,''));
    return'<ul>'+items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
  });
  // 8) Listas numeradas
  s=s.replace(/(?:^\d+\.\s+.+(?:\n|$))+/gm,(block)=>{
    const items=block.trim().split('\n').map(l=>l.replace(/^\d+\.\s+/,''));
    return'<ol>'+items.map(i=>`<li>${i}</li>`).join('')+'</ol>';
  });
  // 9) Inline code `xx`
  s=s.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  // 10) P\u00E1rrafos: separar por doble salto, l\u00EDneas simples \u2192 <br>
  s=s.split(/\n{2,}/).map(p=>{
    p=p.trim();if(!p)return"";
    if(/^<(h[1-6]|ul|ol|pre|blockquote|hr)/.test(p))return p;
    return'<p>'+p.replace(/\n/g,'<br>')+'</p>';
  }).join('');
  // 11) Restaurar bloques de c\u00F3digo
  s=s.replace(/\uE000CODE(\d+)\uE000/g,(m,i)=>`<pre><code>${codeBlocks[parseInt(i)]}</code></pre>`);
  return s;
}

// FIX: centralized habits parser \u2014 avoids repeated try/catch JSON parsing
function getHabits(week){
  const d=ht[week];
  if(!d)return[];
  try{return typeof d.habits==="string"?JSON.parse(d.habits):(d.habits||[]);}
  catch(e){return[];}
}

function calcStreak(){
  if(!cals.length)return 0;
  const sorted=[...cals].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  let streak=0;const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<sorted.length;i++){
    const d=new Date(sorted[i].created_at);d.setHours(0,0,0,0);
    const exp=new Date(today);exp.setDate(exp.getDate()-i);
    if(d.getTime()===exp.getTime())streak++;else break;
  }
  return streak;
}

function calcCoherence(weekNum){
  const habits=getHabits(weekNum||hwk);
  if(!habits.length)return 0;
  const sumPct=habits.reduce((s,h)=>{
    const freq=h.frequency||7;
    const checked=Math.min((h.days||[]).filter(Boolean).length,freq);
    return s+(checked/freq)*100;
  },0);
  return Math.round(sumPct/habits.length);
}

function calcHabPct(weekNum){
  const habits=getHabits(weekNum||hwk);
  if(!habits.length)return 0;
  let totalExpected=0,totalDone=0;
  habits.forEach(h=>{
    const freq=h.frequency||7;
    totalExpected+=freq;
    totalDone+=Math.min((h.days||[]).filter(Boolean).length,freq);
  });
  return totalExpected?Math.round(totalDone/totalExpected*100):0;
}

function calcAttitudeAvg(){
  if(!cals.length)return null;
  const recent=cals.slice(0,7);
  return(recent.reduce((s,c)=>s+c.coherence,0)/recent.length).toFixed(1);
}

/* ============ AUDIO MANAGER \u2014 single instance, prevents overlap ============ */
const Audio_={
  _current:null,
  // Create or reuse an Audio() object for a given url+key
  get(key,url){
    if(!this._store)this._store={};
    if(!this._store[key]||this._store[key]._url!==url){
      if(this._store[key])this._store[key].pause();
      const a=new Audio();
      a._url=url;a._key=key;a.preload="metadata";
      this._store[key]=a;
    }
    return this._store[key];
  },
  // Stop all except given key
  stopOthers(key){
    if(!this._store)return;
    Object.keys(this._store).forEach(k=>{
      if(k!==key&&!this._store[k].paused)this._store[k].pause();
    });
  },
  play(key,url){
    const a=this.get(key,url);
    this.stopOthers(key);
    if(!a.src||a.src!==url)a.src=url;
    return a.play();
  },
  pause(key){if(this._store&&this._store[key])this._store[key].pause();},
  toggle(key,url,onPlay,onPause){
    const a=this.get(key,url);
    if(a.paused){this.play(key,url).then(()=>onPlay&&onPlay()).catch(e=>toast("Error: "+e.message,"err"));}
    else{a.pause();onPause&&onPause();}
  },
  onTime(key,cb){const a=this._store?.[key];if(a){a.removeEventListener("timeupdate",a._timeCb);a._timeCb=cb;a.addEventListener("timeupdate",cb);}},
  onEnd(key,cb){const a=this._store?.[key];if(a){a.removeEventListener("ended",a._endCb);a._endCb=cb;a.addEventListener("ended",cb);}},
  seek(key,pct){const a=this._store?.[key];if(a&&a.duration)a.currentTime=pct*a.duration;},
  skip(key,s){const a=this._store?.[key];if(a)a.currentTime=Math.max(0,a.currentTime+s);},
  isPaused(key){return!this._store?.[key]||this._store[key].paused;},
};

async function doAuth(){
  const email=document.getElementById("auth-email").value.trim();
  const pass=document.getElementById("auth-pass").value;
  const errEl=document.getElementById("auth-error");
  const btn=document.getElementById("auth-btn");
  if(!email||!pass){errEl.textContent=lang==='es'?"Email y contrase\u00F1a requeridos":"Email and password required";return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';errEl.textContent="";
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){errEl.textContent=error.message;return;}
    if(data.user){user=data.user;await initApp();}
  }catch(e){errEl.textContent=e.message;}
  finally{btn.disabled=false;updateAuthUI();}
}

async function forgotPassword(){
  const email=document.getElementById("auth-email").value.trim().toLowerCase();
  const errEl=document.getElementById("auth-error");
  if(!email){errEl.textContent=lang==='es'?"Escribe tu email arriba y vuelve a tocar el enlace.":"Type your email above and tap the link again.";document.getElementById("auth-email").focus();return;}
  const btn=document.getElementById("btn-forgot");btn.disabled=true;
  try{
    const redirect=window.location.origin+window.location.pathname;
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:redirect});
    if(error){errEl.textContent=error.message;return;}
    errEl.textContent=lang==='es'
      ?"Listo: enviamos un enlace a "+email+" para crear tu nueva contrasena. Revisa tambien spam/promociones."
      :"Done: we sent a link to "+email+" to create your new password. Check spam too.";
  }catch(e){errEl.textContent=e.message||"Error";}
  finally{btn.disabled=false;}
}

// Devuelve los IDs de logros que el usuario YA cumple (segun el estado actual)
function earnedAchievements(){
  const streak=calcStreak();
  const ids=[];
  if(cals.length>=1)ids.push("first-calib");
  if(chatHistory.length>0)ids.push("first-coach");
  if(bels.length>0)ids.push("first-belief");
  [3,7,14,21,30].forEach(n=>{if(streak>=n)ids.push("streak-"+n);});
  [1,2,3,4].forEach(p=>{const s=(p-1)*4+1;if([s,s+1,s+2,s+3].every(w=>wkp[w]))ids.push("phase-"+p);});
  if((prof?.current_week||hwk)>=8||wkp[8])ids.push("halfway");
  if(prof?.graduated)ids.push("graduate");
  return ids;
}

// Marca logros nuevos. Devuelve los recien obtenidos. Con {silent:true} no muestra popups.
function checkAchievements(opts){
  if(!user)return[];
  const earned=earnedAchievements();
  const shownKey="maat-ach-"+user.id;
  const shown=JSON.parse(localStorage.getItem(shownKey)||"{}");
  const newly=earned.filter(id=>!shown[id]);
  newly.forEach((id,i)=>{
    shown[id]=true;
    if(!opts||!opts.silent){
      const a=ACHIEVEMENTS.find(x=>x.id===id);
      if(a)setTimeout(()=>showAchievement(a.icon,lang==='es'?a.es.t:a.en.t,lang==='es'?a.es.d:a.en.d,a.img),1000+i*1600);
    }
  });
  localStorage.setItem(shownKey,JSON.stringify(shown));
  return newly;
}

// Fase 1 \u2014 4 queries esenciales para renderizar el home
async function loadDataCritical(){
  if(!user)return;
  const uid=user.id;
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),8000));
  try{
    const results=await Promise.race([
      Promise.allSettled([
        sb.from("profiles").select("*").eq("id",uid).single(),
        sb.from("calibrations").select("*").eq("user_id",uid).order("created_at",{ascending:false}).limit(60),
        sb.from("week_progress").select("*").eq("user_id",uid),
        sb.from("habit_tracker").select("*").eq("user_id",uid),
      ]),timeout
    ]);
    if(results[0]?.status==="fulfilled"){const{data,error}=results[0].value;if(!error&&data){prof=data;hwk=prof.current_week||1;notifHour=prof.notification_hour||9;if(prof.preferred_lang&&prof.preferred_lang!==lang){lang=prof.preferred_lang;localStorage.setItem("maat-lang",lang);}}else if(error)chkAuthErr(error);}
    if(results[1]?.status==="fulfilled"){const{data,error}=results[1].value;if(!error)cals=data||[];else chkAuthErr(error);}
    if(results[2]?.status==="fulfilled"){const{data,error}=results[2].value;if(!error&&data){wkp={};data.forEach(r=>{wkp[r.week]=r.completed;});}else if(error)chkAuthErr(error);}
    if(results[3]?.status==="fulfilled"){const{data,error}=results[3].value;if(!error&&data){ht={};wkLearning={};data.forEach(r=>{ht[r.week]=r;if(r.learned)wkLearning[r.week]=r.learned;});}else if(error)chkAuthErr(error);}
  }catch(e){_w("loadDataCritical:",e.message);}
}

// Fase 2 \u2014 datos secundarios (no bloquean el primer render)

  if(!user)return;
  const uid=user.id;
  try{
    const results=await Promise.allSettled([
      sb.from("beliefs").select("*").eq("user_id",uid).order("created_at",{ascending:false}),

      sb.from("event_registrations").select("event_id,status").eq("user_id",uid),

    ]);

    if(results[5]?.status==="fulfilled"){const{data}=results[5].value;if(data)meditations=data||[];}
    if(results[6]?.status==="fulfilled"){const{data}=results[6].value;if(data)events=data||[];}
    if(results[7]?.status==="fulfilled"){const{data}=results[7].value;if(data)myEventRegs=data||[];}
    if(results[8]?.status==="fulfilled"){const{data}=results[8].value;if(data)communityPulse=data;}
    if(results[9]?.status==="fulfilled"){const{data}=results[9].value;if(data)mySessions=data||[];}
  }catch(e){_w("loadDataSecondary:",e.message);}
}

/* ============ NAVIGATION ============ */
const _mainViews=new Set(["v-home","v-calib","v-habitos","v-coach","v-mas"]);
function nav(id){
  document.querySelector('.main-content')?.scrollTo({top:0,behavior:'instant'});
  if(_appReady)track("view_enter",{view:id});
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  const el=document.getElementById(id);if(el)el.classList.add("active");
  const isMain=_mainViews.has(id);
  document.querySelectorAll(".nav-item").forEach(n=>{
    const active=isMain&&n.dataset.view===id;
    n.classList.toggle("active",active);
    n.setAttribute("aria-current",active?"page":"false");
  });
  if(id==="v-home")renderHome();
  else if(id==="v-calib")renderCalib();
  else if(id==="v-habitos"){_habViewWeek=hwk;renderHabits();}
  else if(id==="v-coach"){
    // Si todavia no llego el chat del server, mostrar skeleton mientras
    if(!_appReady&&!chatHistory.length){document.getElementById("v-coach").innerHTML=skelCoach();}
    renderCoach();
  }
  else if(id==="v-mas")renderMas();
  else if(id==="v-logros")renderLogros();
  else if(id==="v-progreso")renderProgress();
  else if(id==="v-creencias")renderBeliefs();
  else if(id==="v-statement")renderStatement();
  else if(id==="v-libro")renderLibro();
  else if(id==="v-pdf")renderPDF();
  else if(id==="v-historial")renderHistorial();
  else if(id==="v-meditacion")renderMeditacion();
  else if(id==="v-dailymaat")renderDailyMaat();
  else if(id==="v-mentor-notes")renderMentorNotes();
  else if(id==="v-sesiones")renderSesiones();
  else if(id==="v-biblioteca"){
    // Datos secundarios aun cargando -> skeleton
    if(!_appReady&&!meditations.length){document.getElementById("v-biblioteca").innerHTML=skelBiblioteca();}
    renderBibliotecaMed();
  }
  else if(id==="v-eventos"){
    if(!_appReady&&!events.length){document.getElementById("v-eventos").innerHTML=skelEventos();}
    renderEventos();
  }
}

  const es=lang==='es';
  if(w<=2)  return es?"Apenas comienzas. Cada calibracion construye el cimiento de todo lo que viene.":"You're just starting. Each calibration builds the foundation for everything ahead.";
  if(w<=4)  return es?"Estas despertando la conciencia. Lo que descubres ahora cambia el resto del camino.":"You're awakening awareness. What you discover now changes the rest of the journey.";

  if(w<=9)  return es?"Estas en el tramo mas profundo del viaje. Si llegaste hasta aqui, tienes lo que se necesita. No sueltes ahora.":"You're in the deepest part of the journey. If you made it here, you have what it takes. Don't let go now.";

  const curPhase=getPhase(hwk);
  let track="";
  for(let p=1;p<=4;p++){
    let segs="";
    for(let i=0;i<4;i++){

      const style=current
        ?`background:${phaseHex[p-1]};box-shadow:0 0 8px ${phaseHex[p-1]};`
        :done?`background:${phaseHex[p-1]};`
        :`background:var(--bd);opacity:.55;`;
      segs+=`<div class="journey-seg${current?' current':''}" style="${style}"></div>`;
    }
    track+=`<div class="journey-phase">${segs}</div>`;
  }
  let labels="";
  for(let p=1;p<=4;p++){
    const active=isGrad||curPhase===p;
    labels+=`<div class="journey-plabel" style="${active?'color:'+phaseHex[p-1]+';font-weight:700;':''}">${phaseNames[p-1]}</div>`;
  }
  let status,msg;
  if(isGrad){
    status=lang==='es'?'Viaje completado \u{1F393}':'Journey completed \u{1F393}';
    msg=lang==='es'?'Completaste las 16 semanas. Tu transformacion es ahora tu nueva base.':'You completed the 16 weeks. Your transformation is now your new foundation.';
  }else{
    status=`${t("week_label")} ${hwk} ${lang==='es'?'de 16':'of 16'} \u00B7 ${phaseNames[curPhase-1]}`;
    msg=journeyMessage(hwk);
  }
  const statusColor=isGrad?'var(--o)':phaseHex[curPhase-1];
  return `<div class="journey-card">
    <div class="journey-title">${lang==='es'?'Tu viaje MAAT':'Your MAAT journey'}</div>
    <div class="journey-track">${track}</div>
    <div class="journey-labels">${labels}</div>
    <div class="journey-status" style="color:${statusColor};">${status}</div>
    <div class="journey-msg">${san(msg)}</div>
  </div>`;
}

// Capa social ligera: pulso de comunidad con copy adaptativo (Relatedness/pertenencia)
function communityCard(){
  if(!communityPulse)return"";

  const es=lang==='es';

  let line;
  if(today>=3)line=es?`${today} personas ya calibraron hoy`:`${today} people already calibrated today`;
  else if(week>=3)line=es?`${week} personas calibraron esta semana`:`${week} people calibrated this week`;
  else line=es?`${members} personas en transformacion contigo`:`${members} people transforming alongside you`;
  return `<div class="card" style="margin-top:16px;border-left:3px solid var(--v);background:linear-gradient(135deg,rgba(137,108,142,.08),transparent);">

    Audio_.onTime('hip',()=>{
      const fill=document.getElementById("home-hip-fill");
      const time=document.getElementById("home-hip-time");
      if(!a.duration)return;
      if(fill)fill.style.width=(a.currentTime/a.duration*100)+"%";
      if(time){const m=Math.floor(a.currentTime/60);const s=Math.floor(a.currentTime%60);time.textContent=m+":"+(s<10?"0":"")+s;}
    });
    Audio_.onEnd('hip',()=>{const btn=document.getElementById("home-hip-btn");if(btn)btn.textContent="\u25B6";});

    // Retry with signed URL on error
    if(!a._errBound){
      a._errBound=true;
      a.addEventListener("error",async()=>{
        if(a._retried||!sh.audio_url)return;a._retried=true;
        try{
          const u=new URL(sh.audio_url);
          const pm=u.pathname.match(/\/object\/public\/hipnosis\/(.+)/);
          if(pm){
            const{data:sd}=await sb.storage.from("hipnosis").createSignedUrl(decodeURIComponent(pm[1]),86400);
            if(sd?.signedUrl){a.src=sd.signedUrl;a.load();}
          }
        }catch(e){_w("Hip audio fallback failed:",e);}
      });
    }
  }
}

function toggleHomeHip(){
  if(!sh?.audio_url)return;
  Audio_.toggle('hip',sh.audio_url,
    ()=>{const btn=document.getElementById("home-hip-btn");if(btn)btn.textContent="\u23F8";},
    ()=>{const btn=document.getElementById("home-hip-btn");if(btn)btn.textContent="\u25B6";}
  );
}

function switchToDeepCalib(){
  _calibMode='deep';_calibStep=0;
  renderCalibStep();
  document.querySelector('.main-content')?.scrollTo({top:0,behavior:'instant'});
}

async function saveCalibExpress(){
  if(calibradoHoy()){toast(lang==="es"?"Ya calibraste hoy. \u00A1Vuelve ma\u00F1ana!":"Already calibrated today. Come back tomorrow!","err");return;}
  const coh=parseInt(document.getElementById("inp-coh").value);
  const note=(document.getElementById("inp-express-note")?.value||"").trim();
  const btn=document.getElementById("btn-save-calib");
  btn.disabled=true;btn.textContent=t("saving");
  try{
    const{data,error}=await sb.from("calibrations").insert({
      user_id:user.id,date:fmtDate(),week:hwk,coherence:coh,
      answer_q1:note,answer_q2:"",answer_q3:"",session_note:"express"
    }).select().single();
    if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
    cals.unshift(data);
    _calibStep=0;_calibAnswers={};
    track("calib_done",{week:hwk,coherence:coh,mode:"express"});
    showCalibClose(coh);
  }finally{btn.disabled=false;btn.textContent=t("btn_save_calib");}
}
function renderCalibStep(){
  const steps=[t("q1"),t("q2"),t("q3")];
  const isLast=_calibStep===3;
  const stepDots=`<div class="calib-steps">${[0,1,2,3].map(i=>`<div class="calib-step-dot ${i<_calibStep?'done':i===_calibStep?'active':''}"></div>`).join("")}<span class="calib-step-label">${isLast?t("attitude_label"):_calibStep+1+"/3"}</span></div>`;
  const el=document.getElementById("v-calib");
  if(isLast){
    el.innerHTML=`
      <h2 style="font-family:var(--font-title);font-size:22px;font-weight:600;margin-bottom:8px;">${t("calib_title")}</h2>
      ${stepDots}
      <div class="card">
        <label class="field-label">${t("attitude_label")}</label>
        <div class="slider-val" id="coh-val">5</div>
        <div class="slider-wrap">
          <input type="range" id="inp-coh" min="1" max="10" value="5" oninput="document.getElementById('coh-val').textContent=this.value">
          <div class="slider-labels"><span>${t("attitude_low")}</span><span>${t("attitude_high")}</span></div>
        </div>
      </div>
      <button class="btn-action" id="btn-save-calib" onclick="saveCalib()">${t("btn_save_calib")}</button>
      <button class="btn-action secondary" style="margin-top:8px;" onclick="_calibStep=2;renderCalibStep()">\u2190 ${lang==='es'?'Anterior':'Back'}</button>
    `;
  } else {
    const key=["q1","q2","q3"][_calibStep];
    el.innerHTML=`
      <h2 style="font-family:var(--font-title);font-size:22px;font-weight:600;margin-bottom:8px;">${t("calib_title")}</h2>
      <p style="font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:16px;">${lang==='es'?'La calibraci\u00F3n es el ritual m\u00E1s poderoso del m\u00E9todo MAAT. En solo tres preguntas y dos minutos, entrenas tu mente para elegir conscientemente la actitud con la que vas a vivir el d\u00EDa.':'The calibration is the most powerful ritual of the MAAT method. In just three questions and two minutes, you train your mind to consciously choose the attitude with which you will live the day.'}</p>
      ${stepDots}
      <div class="card"><label class="field-label">${steps[_calibStep]}</label><textarea id="inp-step" rows="4" placeholder="${lang==='es'?'Escribe tu respuesta...':'Write your answer...'}">${san(_calibAnswers[key]||"")}</textarea></div>
      <button class="btn-action" onclick="nextCalibStep()">${_calibStep<2?(lang==='es'?'Siguiente':'Next')+' \u2192':lang==='es'?'Continuar':'Continue'} \u2192</button>
      ${_calibStep>0?`<button class="btn-action secondary" style="margin-top:8px;" onclick="prevCalibStep()">\u2190 ${lang==='es'?'Anterior':'Back'}</button>`:`<button class="btn-action secondary" style="margin-top:8px;" onclick="renderCalibExpress()">\u26a1 ${lang==='es'?'Volver a calibraci\u00f3n express':'Back to express'}</button>`}
    `;
    setTimeout(()=>document.getElementById("inp-step")?.focus(),100);
  }
}
function nextCalibStep(){
  const keys=["q1","q2","q3"];
  const inp=document.getElementById("inp-step");
  const val=inp?.value.trim();
  if(!val){inp?.classList.add("field-error");inp?.focus();toast(t("error_fields"),"err");return;}
  inp?.classList.remove("field-error");
  _calibAnswers[keys[_calibStep]]=val;
  _calibStep++;
  renderCalibStep();
  document.getElementById("v-calib")?.scrollTo({top:0,behavior:'instant'});
  document.querySelector('.main-content')?.scrollTo({top:0,behavior:'instant'});
}
function prevCalibStep(){
  const keys=["q1","q2","q3"];
  const val=document.getElementById("inp-step")?.value.trim();
  if(val)_calibAnswers[keys[_calibStep]]=val;
  _calibStep=Math.max(0,_calibStep-1);
  renderCalibStep();
}

async function saveCalib(){
  const q1=_calibAnswers.q1||"";
  const q2=_calibAnswers.q2||"";
  const q3=_calibAnswers.q3||"";
  if(!q1||!q2||!q3){toast(t("error_fields"),"err");return;}
  if(calibradoHoy()){toast(lang==="es"?"Ya calibraste hoy. \u00A1Vuelve ma\u00F1ana!":"Already calibrated today. Come back tomorrow!","err");return;}
  const coh=parseInt(document.getElementById("inp-coh").value);
  const btn=document.getElementById("btn-save-calib");
  btn.disabled=true;btn.textContent=t("saving");
  try{
    const{data,error}=await sb.from("calibrations").insert({
      user_id:user.id,date:fmtDate(),week:hwk,coherence:coh,
      answer_q1:q1,answer_q2:q2,answer_q3:q3,session_note:""
    }).select().single();
    if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
    cals.unshift(data);
    _calibStep=0;_calibAnswers={};
    track("calib_done",{week:hwk,coherence:coh,mode:"deep"});
    showCalibClose(coh);
  }finally{btn.disabled=false;btn.textContent=t("btn_save_calib");}
}

// FIX: chgHW modifies local view week only, not global hwk
// LOCK: no puede avanzar a la siguiente semana sin evaluar la actual
function chgHW(d){
  const n=_habViewWeek+d;
  if(n<1||n>16)return;
  if(d>0&&!wkp[_habViewWeek]){
    toast(lang==='es'
      ?`Eval\u00FAa la Semana ${_habViewWeek} antes de continuar`
      :`Evaluate Week ${_habViewWeek} before continuing`,"err");
    return;
  }
  _habViewWeek=n;renderHabits();
}

// Auto-guardado con debounce: persiste los d\u00EDas marcados sin acci\u00F3n manual
function autoSaveHabits(){
  if(_habitSaveTimer)clearTimeout(_habitSaveTimer);
  _habitSaveTimer=setTimeout(async()=>{
    const habits=getHabits(_habViewWeek);
    const existing=ht[_habViewWeek]||{};
    const{error}=await sb.from("habit_tracker").upsert({
      user_id:user.id,week:_habViewWeek,habits,
      intention:existing.intention||"",learned:existing.learned||"",
      felt:existing.felt||"",belief:existing.belief||"",
      updated_at:new Date().toISOString()
    },{onConflict:"user_id,week"});
    if(error){if(!chkAuthErr(error)){
      const ind=document.getElementById("habit-save-ind");
      if(ind){ind.textContent="\u26A0\uFE0F";ind.style.color="var(--r)";}
    }}else{
      if(!ht[_habViewWeek])ht[_habViewWeek]={};
      ht[_habViewWeek].habits=habits;
      // Indicador visual sutil de guardado
      const ind=document.getElementById("habit-save-ind");
      if(ind){ind.textContent="\u2713 guardado";ind.style.color="var(--m)";setTimeout(()=>{if(ind)ind.textContent="";},2000);}
    }
  },1500);
  // Mostrar indicador "guardando\u2026"
  const ind=document.getElementById("habit-save-ind");
  if(ind){ind.textContent="\u23F3 guardando...";ind.style.color="var(--mu)";}
}

// FIX: toggleDay updates both DOM and ht state object
function toggleDay(el){
  el.classList.toggle("checked");
  el.classList.remove("pop");
  void el.offsetWidth; // force reflow
  el.classList.add("pop");
  setTimeout(()=>el.classList.remove("pop"),400);
  const isChecked=el.classList.contains("checked");
  if(isChecked)track("habit_check",{week:_habViewWeek});
  el.textContent=isChecked?"\u2713":t("days")[parseInt(el.dataset.di)];
  // Sync state
  const hi=parseInt(el.dataset.hi);
  const di=parseInt(el.dataset.di);
  const habits=getHabits(_habViewWeek);
  if(habits[hi]){
    if(!habits[hi].days)habits[hi].days=[false,false,false,false,false,false,false];
    habits[hi].days[di]=isChecked;
    if(!ht[_habViewWeek])ht[_habViewWeek]={habits:[]};
    ht[_habViewWeek].habits=habits;
    // Update progress bar inline without full re-render
    const item=el.closest(".habit-item");
    if(item){
      const freq=habits[hi].frequency||7;
      const done=Math.min(habits[hi].days.filter(Boolean).length,freq);
      const pct=Math.min(100,Math.round(done/freq*100));
      const isFulfilled=done>=freq;
      const fill=item.querySelector(".habit-progress .fill");
      if(fill){fill.style.width=pct+"%";fill.style.background=isFulfilled?'var(--m)':'var(--o)';}
      const freqEl=item.querySelector(".habit-freq");
      if(freqEl)freqEl.innerHTML=`${done}/${freq} \u00B7 ${pct}%${isFulfilled?' <span style="color:var(--m)">\u2713</span>':''}`;
    }
    // Update coherence header
    const cohEl=document.querySelector(".coherence-big .coh-val");
    const coh=calcCoherence(_habViewWeek);
    if(cohEl){cohEl.textContent=coh+"%";cohEl.style.color=cohColor(coh);}
    // Auto-guardar en Supabase
    autoSaveHabits();
  }
}

function addHabit(){
  const nameEl=document.getElementById("new-h-name");
  const name=nameEl.value.trim();
  const freq=parseInt(document.getElementById("new-h-freq").value)||5;
  if(!name){nameEl.classList.add("field-error");nameEl.focus();toast(lang==='es'?'Escribe el nombre del h\u00E1bito':'Enter habit name',"err");return;}
  nameEl.classList.remove("field-error");
  const habits=getHabits(_habViewWeek);
  habits.push({name,frequency:freq,days:[false,false,false,false,false,false,false]});
  if(!ht[_habViewWeek])ht[_habViewWeek]={habits,intention:"",learned:"",felt:"",belief:""};
  else ht[_habViewWeek].habits=habits;
  renderHabits();
}

function removeHabit(idx){
  const habits=getHabits(_habViewWeek);
  habits.splice(idx,1);
  if(ht[_habViewWeek])ht[_habViewWeek].habits=habits;
  renderHabits();
}

async function evaluateWeek(){
  const habits=getHabits(_habViewWeek);
  if(!habits.length){toast(lang==='es'?'Agrega h\u00E1bitos primero':'Add habits first',"err");return;}
  const btn=document.getElementById("btn-evaluate-week");
  btn.disabled=true;btn.textContent=lang==='es'?'Guardando...':'Saving...';
  try{
    const existing=ht[_habViewWeek]||{};
    const{data,error}=await sb.from("habit_tracker").upsert({
      user_id:user.id,week:_habViewWeek,habits,
      intention:existing.intention||"",learned:existing.learned||"",
      felt:existing.felt||"",belief:existing.belief||"",
      updated_at:new Date().toISOString()
    },{onConflict:"user_id,week"}).select().single();
    if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
    ht[_habViewWeek]=data;
    const totalHabits=habits.length;
    const fulfilled=habits.filter(h=>(h.days||[]).filter(Boolean).length>=(h.frequency||7)).length;
    const coherence=calcCoherence(_habViewWeek);
    // 1) Marcar la semana evaluada como completada en week_progress
    const evaluatedWeek=_habViewWeek;
    const{error:wpErr}=await sb.from("week_progress").upsert({user_id:user.id,week:evaluatedWeek,completed:true},{onConflict:"user_id,week"});
    if(!wpErr)wkp[evaluatedWeek]=true;
    // 2) Auto-graduaci\u00F3n si evalu\u00F3 la semana 16 estando en ella
    let advanced=false,graduatedNow=false;
    if(evaluatedWeek===hwk && hwk===16 && !prof?.graduated){
      const{error:gErr}=await sb.from("profiles").update({graduated:true,graduated_at:new Date().toISOString()}).eq("id",user.id);
      if(!gErr){
        if(prof){prof.graduated=true;prof.graduated_at=new Date().toISOString();}
        graduatedNow=true;
      }
    }
    // 3) Si estaba en la semana actual y a\u00FAn no es la \u00FAltima, avanzar current_week
    else if(evaluatedWeek===hwk && hwk<16){
      const newWeek=hwk+1;
      const{error:pErr}=await sb.from("profiles").update({current_week:newWeek}).eq("id",user.id);
      if(!pErr){
        hwk=newWeek;
        if(prof)prof.current_week=newWeek;
        advanced=true;
      }
    }
    const advMsg=advanced?` \u00B7 ${lang==='es'?'Avanzaste a Semana '+hwk:'Advanced to Week '+hwk}`:'';
    toast(`${lang==='es'?'Coherencia':'Coherence'}: ${coherence}% \u2014 ${fulfilled}/${totalHabits} ${lang==='es'?'completos':'completed'}${advMsg}`,"ok");
    // 4) Si nos graduamos, mostrar celebraci\u00F3n rica y volver al home
    if(graduatedNow){
      setTimeout(()=>{
        showGraduationCelebration();
      },600);
      return;
    }
    // 5) Si avanzamos, actualiza la vista de h\u00E1bitos a la nueva semana
    if(advanced)_habViewWeek=hwk;
    renderHabits();
    // 6) Ofrecer copiar h\u00E1bitos a siguiente semana
    const nextW=evaluatedWeek+1;
    if(nextW<=16&&!getHabits(nextW).length){
      setTimeout(()=>{
        const msg=lang==='es'
          ?`\u00BFCopiar estos ${habits.length} h\u00E1bitos a la semana ${nextW}?`
          :`Copy these ${habits.length} habits to week ${nextW}?`;
        if(confirm(msg))copyHabitsFromWeek(evaluatedWeek,nextW);
      },600);
    }
  }finally{btn.disabled=false;btn.textContent=lang==='es'?'Evaluar':'Evaluate';}
}

async function copyHabitsFromWeek(fromWeek,toWeek){
  toWeek=toWeek||_habViewWeek;
  const srcHabits=getHabits(fromWeek);
  if(!srcHabits.length){toast(lang==='es'?'No hay h\u00E1bitos en la semana '+fromWeek:'No habits found in week '+fromWeek,"err");return;}
  // Clonar h\u00E1bitos reseteando los d\u00EDas marcados
  const cloned=srcHabits.map(h=>({name:h.name,frequency:h.frequency||7,days:[false,false,false,false,false,false,false]}));
  if(!ht[toWeek])ht[toWeek]={habits:[],intention:"",learned:"",felt:"",belief:""};
  ht[toWeek].habits=cloned;
  // Guardar en Supabase
  try{
    const existing=ht[toWeek]||{};
    const{data,error}=await sb.from("habit_tracker").upsert({
      user_id:user.id,week:toWeek,habits:cloned,
      intention:existing.intention||"",learned:existing.learned||"",
      felt:existing.felt||"",belief:existing.belief||"",
      updated_at:new Date().toISOString()
    },{onConflict:"user_id,week"}).select().single();
    if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
    ht[toWeek]=data;
    toast(lang==='es'?`\u2713 ${cloned.length} h\u00E1bitos copiados a semana ${toWeek}`:`\u2713 ${cloned.length} habits copied to week ${toWeek}`,"ok");
    _habViewWeek=toWeek;
    renderHabits();
  }catch(e){toast(e.message,"err");}
}

function useChip(btn){

async function sendMsg(){
  if(chatLocked)return;
  const inp=document.getElementById("chat-input");
  const msg=inp.value.trim();if(!msg)return;inp.value="";
  track("coach_msg",{week:hwk});
  chatHistory.push({role:"user",content:msg});
  const msgEl=document.getElementById("chat-messages");
  msgEl.insertAdjacentHTML("beforeend",`<div class="chat-msg user">${san(msg)}</div>`);
  msgEl.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant typing-indicator" id="typing"><span></span><span></span><span></span></div>`);
  msgEl.scrollTop=msgEl.scrollHeight;
  chatLocked=true;
  try{
    const{data:{session}}=await sb.auth.getSession();
    const token=session?.access_token;
    if(!token){toast(lang==='es'?'Tu sesi\u00F3n expir\u00F3. Vuelve a iniciar sesi\u00F3n.':'Session expired. Please log in again.','err');chatLocked=false;document.getElementById("typing")?.remove();return;}
    const body={messages:chatHistory.slice(-20),stream:true};
    if(aiCfg?.system_prompt)body.system=aiCfg.system_prompt;
    const res=await fetch(CONFIG.SUPABASE_URL+"/functions/v1/coach-maat",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      let errMsg='Error del servidor ('+res.status+')';
      try{const j=await res.json();errMsg=j.error||errMsg;}catch(_){}
      throw new Error(errMsg);
    }
    // Si la edge function NO devuelve SSE (compat con version vieja desplegada),
    // procesar como JSON. Si SI devuelve SSE, hacer streaming token a token.
    const ctype=res.headers.get("content-type")||"";
    let reply="";
    if(ctype.includes("text/event-stream")&&res.body){
      // STREAMING: ir construyendo la respuesta del assistant en vivo
      document.getElementById("typing")?.remove();
      const bubbleId="coach-streaming-"+Date.now();
      msgEl.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant" id="${bubbleId}"></div>`);
      const bubble=document.getElementById(bubbleId);
      const reader=res.body.getReader();
      const dec=new TextDecoder();
      let buf="";
      let lastRender=0;
      while(true){
        const{value,done}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split("\n");
        buf=lines.pop()||"";
        for(const line of lines){
          if(!line.startsWith("data:"))continue;
          const payload=line.slice(5).trim();
          if(!payload||payload==="[DONE]")continue;
          try{
            const chunk=JSON.parse(payload);
            const delta=chunk.choices?.[0]?.delta?.content||"";
            if(delta){
              reply+=delta;
              // Re-renderizar markdown cada ~80ms (no en cada token, para no asfixiar el DOM)
              const now=performance.now();
              if(now-lastRender>80){
                bubble.innerHTML=mdRender(reply);
                msgEl.scrollTop=msgEl.scrollHeight;
                lastRender=now;
              }
            }
          }catch(_){/* chunks parciales: el split por \n los ensambla bien en la siguiente vuelta */}
        }
      }
      // Render final con la respuesta completa
      bubble.innerHTML=mdRender(reply||"...");
    }else{
      // FALLBACK no-streaming (Edge Function vieja sin stream desplegada)
      const json=await res.json();
      reply=json.reply||json.content||json.message||"...";
      document.getElementById("typing")?.remove();
      msgEl.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant">${mdRender(reply)}</div>`);
    }
    chatHistory.push({role:"assistant",content:reply});
    if(chatHistory.length>100)chatHistory=chatHistory.slice(-100);
    try{localStorage.setItem("maat-chat-"+user?.id,JSON.stringify(chatHistory.slice(-20)));}catch(e){}
    saveChatServer();
  }catch(e){
    document.getElementById("typing")?.remove();
    msgEl.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant" style="color:var(--r)">Error: ${san(e.message)}</div>`);
  }finally{chatLocked=false;msgEl.scrollTop=msgEl.scrollHeight;}
}

async function loadMentorContact(){

function renderStatement(){
  const stmt=sh?.statement||"";
  const audioUrl=sh?.audio_url||"";
  const audioName=sh?.audio_name||"";
  document.getElementById("v-statement").innerHTML=`
    <div class="sv-header"><button class="btn-back" onclick="gv('v-mas')">\u2039</button><h2>${t("statement_title")}</h2></div>
    <p style="font-size:14px;color:var(--mu);margin:0 0 16px;line-height:1.6;">${lang==='es'?'Tu statement es la declaraci\u00F3n de qui\u00E9n eliges ser. Escr\u00EDbelo, l\u00E9elo cada d\u00EDa y escucha el audio de hipnosis para anclar esa identidad en tu mente subconsciente. La repetici\u00F3n consciente crea cambio real.':'Your statement is the declaration of who you choose to be. Write it, read it daily, and listen to the hypnosis audio to anchor that identity in your subconscious mind. Conscious repetition creates real change.'}</p>
    <div class="card">
      <textarea id="stmt-text" rows="6" placeholder="${t("statement_placeholder")}">${san(stmt)}</textarea>
      <button class="btn-action" onclick="saveStatement()">${t("save")}</button>
    </div>
    <h3 style="font-family:var(--font-title);font-size:18px;margin:20px 0 12px;">\u{1F3A7} ${t("audio_hipnosis")}</h3>
    <div class="audio-player" id="hip-player">
      ${audioUrl?`
        <p class="text-mu mb-8" style="font-size:12px;">${san(audioName)}</p>
        <audio id="hip-native" controls preload="auto" style="width:100%;margin:12px 0;border-radius:8px;height:42px;"></audio>
        <p id="hip-error" style="display:none;color:var(--r);font-size:12px;margin-top:8px;"></p>
      `:`<p class="text-mu">${lang==='es'?'Sube un audio para comenzar':'Upload audio to start'}</p>`}
    </div>
    <div class="card">
      <label class="field-label">${t("upload_audio")}</label>
      <input type="file" accept="audio/mpeg,audio/mp3,audio/*" id="hip-upload" onchange="uploadAudio()" style="color:var(--text);">
    </div>
  `;

  // FIX: native <audio> element is for Statement view only
  // Home view uses Audio_ manager with key 'hip' independently
  if(audioUrl){
    const audioEl=document.getElementById("hip-native");
    if(audioEl){
      let _retried=false;
      audioEl.addEventListener("error",async()=>{
        if(_retried)return;_retried=true;
        try{
          const u=new URL(audioUrl);
          const pm=u.pathname.match(/\/object\/public\/hipnosis\/(.+)/);
          if(pm){
            const{data:sd}=await sb.storage.from("hipnosis").createSignedUrl(decodeURIComponent(pm[1]),86400);
            if(sd?.signedUrl){audioEl.src=sd.signedUrl;audioEl.load();return;}
          }
        }catch(e){console.error("Signed URL fallback failed:",e);}
        const errEl=document.getElementById("hip-error");
        if(errEl){errEl.style.display="block";errEl.textContent="No se pudo cargar el audio.";}
      },{once:true});
      audioEl.src=audioUrl;
      audioEl.load();
    }
  }
}

async function saveStatement(){
  const text=document.getElementById("stmt-text").value.trim();
  const{data,error}=await sb.from("statement_hipnosis").upsert({
    user_id:user.id,statement:text,audio_url:sh?.audio_url||null,
    audio_name:sh?.audio_name||null,updated_at:new Date().toISOString()
  },{onConflict:"user_id"}).select().single();
  if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
  sh=data;toast(t("saved"),"ok");renderHome();
}

async function uploadAudio(){
  const file=document.getElementById("hip-upload").files[0];
  if(!file)return;
  if(!file.type.includes("audio")&&!file.name.endsWith(".mp3")){toast(lang==='es'?"Solo archivos de audio":"Only audio files","err");return;}
  toast(lang==='es'?"Subiendo audio...":"Uploading audio...","");
  const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'');
  const path=`${user.id}/${Date.now()}_${safeName}`;
  const{error:upErr}=await sb.storage.from("hipnosis").upload(path,file,{upsert:true,contentType:"audio/mpeg",cacheControl:"3600"});
  if(upErr){toast("Error subida: "+upErr.message,"err");return;}
  const{data:urlData}=sb.storage.from("hipnosis").getPublicUrl(path);
  let audioUrl=urlData?.publicUrl||"";
  // Verify public URL
  let urlWorks=false;
  try{const test=await fetch(audioUrl,{method:"HEAD"});urlWorks=test.ok;}catch(e){}
  if(!urlWorks){
    const{data:signedData,error:signedErr}=await sb.storage.from("hipnosis").createSignedUrl(path,31536000);
    if(!signedErr&&signedData?.signedUrl)audioUrl=signedData.signedUrl;
    else{toast("Error: no se pudo generar URL del audio","err");return;}
  }
  const{data,error}=await sb.from("statement_hipnosis").upsert({
    user_id:user.id,audio_url:audioUrl,audio_name:file.name,
    statement:sh?.statement||"",updated_at:new Date().toISOString()
  },{onConflict:"user_id"}).select().single();
  if(error){if(!chkAuthErr(error))toast(error.message,"err");return;}
  sh=data;
  // Reset audio manager for 'hip' key so it reloads with new URL
  if(Audio_._store?.hip){Audio_._store.hip.pause();delete Audio_._store.hip;}
  renderStatement();
  toast(t("saved"),"ok");
}

async function toggleMedLib(medId, url){
  if(_activeMedId===medId){
    Audio_.toggle('ml-'+medId,url,()=>{},()=>{});
    return;
  }
  // Detener audio anterior
  if(_activeMedId)Audio_.stop('ml-'+_activeMedId);
  _activeMedId=medId;
  track("meditation_play",{id:medId});
  renderBibliotecaMed();
  // Iniciar audio
  const a=Audio_.get('ml-'+medId,url);
  if(!a.src)a.src=url;
  Audio_.onTime('ml-'+medId,()=>{
    const fill=document.getElementById('mlf-'+medId);
    const time=document.getElementById('mlt-'+medId);
    if(!a.duration)return;
    if(fill)fill.style.width=(a.currentTime/a.duration*100)+'%';
    if(time){const m=Math.floor(a.currentTime/60),s=Math.floor(a.currentTime%60);time.textContent=m+':'+(s<10?'0':'')+s;}
    // Log completado si > 80%
    if(a.duration&&(a.currentTime/a.duration)>0.8)logMeditation(medId,true,Math.round(a.currentTime));
  });
  Audio_.onEnd('ml-'+medId,()=>{logMeditation(medId,true,null);renderBibliotecaMed();_activeMedId=null;});
  a.play().catch(()=>{});
}

async function logMeditation(medId,completed,durationSec){
  if(!user||!medId)return;
  // Solo loguear una vez por sesi\u00F3n (evitar duplicados)
  const key='maat-med-log-'+medId+'-'+new Date().toDateString();
  if(localStorage.getItem(key))return;
  localStorage.setItem(key,'1');
  await sb.from('meditation_logs').insert({user_id:user.id,meditation_id:medId,completed,duration_sec:durationSec});
}

async function registerEvent(eventId){

const BOOK={
  phases:[

      id:1,color:"var(--phase1)",hex:"#39A1C9",

          time:5,
          body_es:`<p>Antes de construir, necesitas ver. El primer paso del m\u00E9todo MAAT no es actuar, es <strong>descubrir</strong>. La mayor\u00EDa de las personas viven en piloto autom\u00E1tico: toman decisiones desde h\u00E1bitos inconscientes, reacciones heredadas y creencias que nunca eligieron.</p>
<p>La Fase 1 interrumpe ese automatismo. Durante cuatro semanas, entrenas tu atenci\u00F3n para ver con claridad: qui\u00E9n eres hoy, qu\u00E9 est\u00E1s construyendo realmente, y desde qu\u00E9 estado interior est\u00E1s operando.</p>
<h4>La pregunta fundamental</h4>
<p>Todo comienza con una pregunta honesta: <em>\u00BFQui\u00E9n est\u00E1s siendo cuando nadie te ve?</em></p>
<p>No qui\u00E9n quieres ser. No qui\u00E9n dices que eres. Qui\u00E9n eres en tus decisiones cotidianas, en c\u00F3mo tratas a las personas, en lo que toleras, en lo que evitas.</p>
<blockquote>"El conocimiento de uno mismo es el principio de toda sabidur\u00EDa." \u2014 Arist\u00F3teles</blockquote>`,
          body_en:`<p>Before building, you need to see. The first step of the MAAT method is not to act, it is to <strong>discover</strong>. Most people live on autopilot: making decisions from unconscious habits, inherited reactions, and beliefs they never chose.</p>
<p>Phase 1 interrupts that automatism. For four weeks, you train your attention to see clearly: who you are today, what you are really building, and from what inner state you are operating.</p>
<h4>The fundamental question</h4>
<p>Everything begins with an honest question: <em>Who are you being when no one is watching?</em></p>
<blockquote>"Self-knowledge is the beginning of all wisdom." \u2014 Aristotle</blockquote>`
        },
        {
          id:"1-2",
          title_es:"La Calibraci\u00F3n como Ritual",title_en:"Calibration as Ritual",
          time:6,
          body_es:`<p>Un piloto no sale a volar sin revisar sus instrumentos. Un cirujano no opera sin conocer el historial del paciente. Un atleta no compite sin conocer su estado f\u00EDsico. T\u00FA no puedes vivir tu mejor d\u00EDa sin saber desde d\u00F3nde lo est\u00E1s comenzando.</p>
<p>La <strong>calibraci\u00F3n diaria</strong> es el ritual m\u00E1s poderoso del m\u00E9todo MAAT. Son tres preguntas, dos minutos, y un h\u00E1bito que transforma la manera en que abordas cada d\u00EDa.</p>
<h4>Las tres preguntas</h4>
<ol>
<li><strong>\u00BFPor qu\u00E9 estoy genuinamente agradecido hoy?</strong> \u2014 La gratitud no es optimismo forzado. Es un acto cognitivo que entrena al cerebro a buscar recursos en lugar de amenazas.</li>
<li><strong>\u00BFQu\u00E9 creencia va a liderar mi d\u00EDa?</strong> \u2014 Cada d\u00EDa opera desde una creencia dom\u00EDnante. Si no la eliges t\u00FA, la elige el entorno.</li>
<li><strong>\u00BFQu\u00E9 estoy evitando enfrentar hoy?</strong> \u2014 La evitaci\u00F3n es la principal causa del estancamiento. Nombrarlo es el primer paso para resolverlo.</li>
</ol>
<p>El nivel de actitud que registras al final (1-10) no es una nota. Es un <em>termostato interior</em>: te dice desde qu\u00E9 energ\u00EDa est\u00E1s eligiendo operar.</p>`,
          body_en:`<p>A pilot does not fly without checking instruments. A surgeon does not operate without knowing the patient's history. You cannot live your best day without knowing where you are starting from.</p>
<p>The <strong>daily calibration</strong> is the most powerful ritual of the MAAT method. Three questions, two minutes, one habit that transforms how you approach every day.</p>
<h4>The three questions</h4>
<ol>
<li><strong>What am I genuinely grateful for today?</strong> \u2014 Gratitude is not forced optimism. It is a cognitive act that trains the brain to seek resources instead of threats.</li>
<li><strong>What belief will lead my day?</strong> \u2014 Every day operates from a dominant belief. If you do not choose it, your environment will.</li>
